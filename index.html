<script type="module">


import * as THREE from

"https://cdn.jsdelivr.net/npm/three@0.179.1/build/three.module.js";


// =====================================================
// SCENE
// =====================================================


const scene =

new THREE.Scene();


scene.background =

new THREE.Color(

0x78b9d5

);


scene.fog =

new THREE.Fog(

0x78b9d5,

45,

130

);


// =====================================================
// CAMERA
// =====================================================


const camera =

new THREE.PerspectiveCamera(

70,

window.innerWidth /

window.innerHeight,

0.1,

300

);


// =====================================================
// RENDERER
// =====================================================


const renderer =

new THREE.WebGLRenderer({

    antialias: true,

    powerPreference:
        "high-performance"

});


renderer.setSize(

window.innerWidth,

window.innerHeight

);


renderer.setPixelRatio(

Math.min(

    window.devicePixelRatio,

    1.25

)
);


renderer.outputColorSpace =

THREE.SRGBColorSpace;


renderer.shadowMap.enabled =

true;


renderer.shadowMap.type =

THREE.PCFSoftShadowMap;


document

.getElementById(

    "game"

)

.appendChild(

    renderer.domElement

);


// =====================================================
// LIGHTING
// =====================================================


const sun =

new THREE.DirectionalLight(

0xffffff,

1.6

);


sun.position.set(

20,

50,

20

);


sun.castShadow =

true;


sun.shadow.mapSize.width =

1024;


sun.shadow.mapSize.height =

1024;


scene.add(

sun

);


const ambient =

new THREE.HemisphereLight(

0xa9ddff,

0x203c26,

1.4

);


scene.add(

ambient

);


// =====================================================
// MATERIALS
// =====================================================


const grassMaterial =

new THREE.MeshStandardMaterial({

    color: 0x315f2d,

    roughness: 0.95,

    metalness: 0

});


const foliageMaterials = [

    new THREE.MeshStandardMaterial({

        color: 0x3f7a38,

        roughness: 1

    }),

    new THREE.MeshStandardMaterial({

        color: 0x2d642f,

        roughness: 1

    }),

    new THREE.MeshStandardMaterial({

        color: 0x4d873d,

        roughness: 1

    })

];


const groundMaterial =

new THREE.MeshStandardMaterial({

    color: 0x527d45,

    roughness: 1

});


const portalMaterial =

new THREE.MeshStandardMaterial({

    color: 0x63ffd0,

    emissive: 0x18ffae,

    emissiveIntensity: 2,

    transparent: true,

    opacity: 0.85

});


// =====================================================
// GAME VARIABLES
// =====================================================


let currentLevel = 1;

let mazeSize = 11;

const cellSize = 4;

let maze = [];

let mazeGroup = null;

let exitPosition = null;

let exitGroup = null;

let startTime = 0;

let playing = false;

let paused = false;

let introAnimation = false;

let lightningActive = false;

let lightningTime = 0;

let wallColliders = [];


const playerRadius = 0.42;

const wallHeight = 6;


const player = {

    x: 0,

    z: 0,

    y: 2,

    velocityY: 0,

    grounded: true

};


let yaw = 0;

let pitch = 0;


const keys = {};


let unlockedLevel =

Number(

    localStorage.getItem(

        "spiritMazeLevel"

    ) || 1

);


// =====================================================
// INPUT
// =====================================================


window.addEventListener(

    "keydown",

    e => {


        keys[e.code] = true;


        if (

            e.code === "Escape"

        ) {


            if (

                playing &&

                !introAnimation

            ) {


                togglePause();

            }

        }

    }

);


window.addEventListener(

    "keyup",

    e => {


        keys[e.code] = false;

    }

);


// =====================================================
// MAZE GENERATOR
// =====================================================


function generateMaze(size) {


    const grid = [];


    for (

        let z = 0;

        z < size;

        z++

    ) {


        grid[z] = [];


        for (

            let x = 0;

            x < size;

            x++

        ) {


            grid[z][x] = 1;

        }

    }


    function carve(x, z) {


        grid[z][x] = 0;


        const directions = [

            [2, 0],

            [-2, 0],

            [0, 2],

            [0, -2]

        ];


        directions.sort(

            () =>

                Math.random() -

                0.5

        );


        for (

            const [dx, dz]

            of directions

        ) {


            const nx =

                x + dx;


            const nz =

                z + dz;


            if (

                nx > 0 &&

                nx < size - 1 &&

                nz > 0 &&

                nz < size - 1 &&

                grid[nz][nx] === 1

            ) {


                grid[

                    z + dz / 2

                ][

                    x + dx / 2

                ] = 0;


                carve(

                    nx,

                    nz

                );

            }

        }

    }


    carve(

        1,

        1

    );


    return grid;

}


// =====================================================
// NATURAL HEDGE
// =====================================================


function createHedge(

    x,

    z

) {


    const group =

        new THREE.Group();


    // Main hedge body

    const bodyGeometry =

        new THREE.BoxGeometry(

            cellSize,

            wallHeight,

            cellSize

        );


    const body =

        new THREE.Mesh(

            bodyGeometry,

            grassMaterial

        );


    body.position.y =

        wallHeight / 2;


    body.castShadow =

        false;


    body.receiveShadow =

        true;


    group.add(

        body

    );


    // Lightweight foliage

    const foliageGeometry =

        new THREE.IcosahedronGeometry(

            1,

            1

        );


    const foliageCount = 5;


    for (

        let i = 0;

        i < foliageCount;

        i++

    ) {


        const foliage =

            new THREE.Mesh(

                foliageGeometry,

                foliageMaterials[

                    i %

                    foliageMaterials.length

                ]

            );


        foliage.scale.set(

            1.1 +

            Math.random() *

            0.9,


            0.7 +

            Math.random() *

            0.8,


            1.1 +

            Math.random() *

            0.9

        );


        foliage.position.set(

            (

                Math.random() -

                0.5

            ) *

            3.4,


            wallHeight -

            0.3 +

            Math.random() *

            0.8,


            (

                Math.random() -

                0.5

            ) *

            3.4

        );


        foliage.rotation.set(

            Math.random() *

            0.5,


            Math.random() *

            Math.PI,


            Math.random() *

            0.5

        );


        foliage.castShadow =

            false;


        foliage.receiveShadow =

            true;


        group.add(

            foliage

        );

    }


    group.position.set(

        x,

        0,

        z

    );


    return group;

}


// =====================================================
// BUILD MAZE
// =====================================================


function buildMaze() {


    if (

        mazeGroup

    ) {


        scene.remove(

            mazeGroup

        );

    }


    mazeGroup =

        new THREE.Group();


    scene.add(

        mazeGroup

    );


    wallColliders = [];


    maze =

        generateMaze(

            mazeSize

        );


    const total =

        mazeSize *

        cellSize;


    // Ground

    const ground =

        new THREE.Mesh(

            new THREE.PlaneGeometry(

                total,

                total

            ),

            groundMaterial

        );


    ground.rotation.x =

        -Math.PI / 2;


    ground.receiveShadow =

        true;


    mazeGroup.add(

        ground

    );


    // Walls

    for (

        let z = 0;

        z < mazeSize;

        z++

    ) {


        for (

            let x = 0;

            x < mazeSize;

            x++

        ) {


            if (

                maze[z][x] === 1

            ) {


                const wallX =

                    (

                        x -

                        mazeSize / 2

                    ) *

                    cellSize;


                const wallZ =

                    (

                        z -

                        mazeSize / 2

                    ) *

                    cellSize;


                mazeGroup.add(

                    createHedge(

                        wallX,

                        wallZ

                    )

                );


                wallColliders.push({

                    minX:

                        wallX -

                        cellSize / 2,


                    maxX:

                        wallX +

                        cellSize / 2,


                    minZ:

                        wallZ -

                        cellSize / 2,


                    maxZ:

                        wallZ +

                        cellSize / 2

                });

            }

        }

    }


    createExit();

}


// =====================================================
// EXIT
// =====================================================


function createExit() {


    if (

        exitGroup

    ) {


        mazeGroup.remove(

            exitGroup

        );

    }


    exitGroup =

        new THREE.Group();


    exitPosition = {


        x:

            (

                mazeSize -

                2 -

                mazeSize / 2

            ) *

            cellSize,


        z:

            (

                mazeSize -

                2 -

                mazeSize / 2

            ) *

            cellSize

    };


    const portal =

        new THREE.Mesh(

            new THREE.TorusGeometry(

                2.1,

                0.35,

                16,

                32

            ),

            portalMaterial

        );


    portal.position.y =

        2.3;


    portal.castShadow =

        false;


    exitGroup.add(

        portal

    );


    const light =

        new THREE.PointLight(

            0x50ffbd,

            8,

            20

        );


    light.position.y =

        2.5;


    exitGroup.add(

        light

    );


    for (

        let i = 0;

        i < 12;

        i++

    ) {


        const particle =

            new THREE.Mesh(

                new THREE.SphereGeometry(

                    0.08,

                    8,

                    8

                ),

                new THREE.MeshBasicMaterial({

                    color:

                        0x9affd5

                })

            );


        particle.position.set(

            (

                Math.random() -

                0.5

            ) *

            4,


            Math.random() *

            4,


            (

                Math.random() -

                0.5

            ) *

            4

        );


        exitGroup.add(

            particle

        );

    }


    exitGroup.position.set(

        exitPosition.x,

        0,

        exitPosition.z

    );


    mazeGroup.add(

        exitGroup

    );

}


// =====================================================
// LIGHTNING
// =====================================================


const lightningGroup =

    new THREE.Group();


scene.add(

    lightningGroup

);


lightningGroup.visible =

    false;


const lightningLight =

    new THREE.PointLight(

        0xffffff,

        0,

        35

    );


lightningGroup.add(

    lightningLight

);


function createLightningBolt() {


    const points = [];


    const startY = 28;


    const endY = 1;


    let x = 0;


    let z = 0;


    points.push(

        new THREE.Vector3(

            x,

            startY,

            z

        )

    );


    const segments = 12;


    for (

        let i = 1;

        i < segments;

        i++

    ) {


        const t =

            i /

            segments;


        x +=

            (

                Math.random() -

                0.5

            ) *

            2.5;


        z +=

            (

                Math.random() -

                0.5

            ) *

            2.5;


        points.push(

            new THREE.Vector3(

                x,

                startY +

                (

                    endY -

                    startY

                ) *

                t,

                z

            )

        );

    }


    points.push(

        new THREE.Vector3(

            x,

            endY,

            z

        )

    );


    const geometry =

        new THREE.BufferGeometry()

        .setFromPoints(

            points

        );


    const material =

        new THREE.LineBasicMaterial({

            color:

                0xffffff,

            transparent:

                true,

            opacity:

                1

        });


    return new THREE.Line(

        geometry,

        material

    );

}


function startLightningAnimation() {


    introAnimation =

        true;


    playing =

        false;


    lightningActive =

        true;


    lightningTime =

        0;


    lightningGroup.visible =

        true;


    lightningGroup.position.set(

        player.x,

        0,

        player.z

    );


    const bolt =

        createLightningBolt();


    lightningGroup.add(

        bolt

    );


    lightningLight.intensity =

        0;


    camera.position.set(

        player.x,

        27,

        player.z

    );


    camera.lookAt(

        player.x,

        0,

        player.z

    );

}


function updateLightningAnimation() {


    if (

        !lightningActive

    ) {


        return;

    }


    lightningTime +=

        0.016;


    if (

        lightningTime < 1.5

    ) {


        lightningLight.intensity =

            0;

    }


    else if (

        lightningTime < 1.7

    ) {


        lightningLight.intensity =

            18;


        flashLightning();

    }


    else if (

        lightningTime < 2.2

    ) {


        lightningLight.intensity =

            4;

    }


    else {


        lightningLight.intensity =

            0;


        lightningGroup.visible =

            false;


        lightningActive =

            false;


        introAnimation =

            false;


        playing =

            true;


        startTime =

            performance.now();

    }

}


function flashLightning() {


    const flash =

        document

        .getElementById(

            "lightningFlash"

        );


    flash.animate(

        [

            {

                opacity:

                    0

            },

            {

                opacity:

                    1

            },

            {

                opacity:

                    0

            }

        ],

        {

            duration:

                350

        }

    );

}


// =====================================================
// START LEVEL
// =====================================================


function startLevel(

    level

) {


    currentLevel =

        level;


    mazeSize =

        11 +

        (

            level -

            1

        ) *

        4;


    if (

        mazeSize %

        2 ===

        0

    ) {


        mazeSize++;

    }


    buildMaze();


    player.x =

        (

            1 -

            mazeSize / 2

        ) *

        cellSize;


    player.z =

        (

            1 -

            mazeSize / 2

        ) *

        cellSize;


    player.y =

        2;


    player.velocityY =

        0;


    player.grounded =

        true;


    yaw =

        0;


    pitch =

        0;


    document

    .getElementById(

        "menu"

    )

    .style.display =

        "none";


    document

    .getElementById(

        "hud"

    )

    .style.display =

        "block";


    document

    .getElementById(

        "pauseButton"

    )

    .style.display =

        "block";


    document

    .getElementById(

        "startHint"

    )

    .style.display =

        "block";


    document

    .getElementById(

        "levelNumber"

    )

    .textContent =

        level;


    // Start with lightning

    startLightningAnimation();

}


// =====================================================
// COLLISION
// =====================================================


function circleIntersectsWall(

    x,

    z,

    wall

) {


    const closestX =

        Math.max(

            wall.minX,

            Math.min(

                x,

                wall.maxX

            )

        );


    const closestZ =

        Math.max(

            wall.minZ,

            Math.min(

                z,

                wall.maxZ

            )

        );


    const dx =

        x -

        closestX;


    const dz =

        z -

        closestZ;


    return (

        dx * dx +

        dz * dz

    ) <

    (

        playerRadius *

        playerRadius

    );

}


function collidesWithWall(

    x,

    z

) {


    for (

        const wall

        of wallColliders

    ) {


        if (

            circleIntersectsWall(

                x,

                z,

                wall

            )

        ) {


            return true;

        }

    }


    return false;

}


// =====================================================
// MOVEMENT
// =====================================================


function tryMove(

    dx,

    dz

) {


    const nextX =

        player.x +

        dx;


    const nextZ =

        player.z +

        dz;


    if (

        !collidesWithWall(

            nextX,

            nextZ

        )

    ) {


        player.x =

            nextX;


        player.z =

            nextZ;


        return;

    }


    if (

        !collidesWithWall(

            nextX,

            player.z

        )

    ) {


        player.x =

            nextX;

    }


    if (

        !collidesWithWall(

            player.x,

            nextZ

        )

    ) {


        player.z =

            nextZ;

    }

}


// =====================================================
// POINTER LOCK
// =====================================================


renderer.domElement.addEventListener(

    "click",

    () => {


        if (

            playing &&

            !paused

        ) {


            renderer

            .domElement

            .requestPointerLock();

        }

    }

);


document.addEventListener(

    "mousemove",

    e => {


        if (

            document.pointerLockElement !==

            renderer.domElement

        ) {


            return;

        }


        yaw -=

            e.movementX *

            0.0025;


        pitch -=

            e.movementY *

            0.0025;


        pitch =

            Math.max(

                -1.45,

                Math.min(

                    1.45,

                    pitch

                )

            );

    }

);


// =====================================================
// PLAYER MOVEMENT
// =====================================================


function movePlayer() {


    if (

        !playing ||

        paused

    ) {


        return;

    }


    const speed =

        0.11;


    let dx = 0;

    let dz = 0;


    const forwardX =

        -Math.sin(

            yaw

        );


    const forwardZ =

        -Math.cos(

            yaw

        );


    const rightX =

        Math.cos(

            yaw

        );


    const rightZ =

        -Math.sin(

            yaw

        );


    if (

        keys.KeyW

    ) {


        dx +=

            forwardX;


        dz +=

            forwardZ;

    }


    if (

        keys.KeyS

    ) {


        dx -=

            forwardX;


        dz -=

            forwardZ;

    }


    if (

        keys.KeyA

    ) {


        dx -=

            rightX;


        dz -=

            rightZ;

    }


    if (

        keys.KeyD

    ) {


        dx +=

            rightX;


        dz +=

            rightZ;

    }


    const length =

        Math.hypot(

            dx,

            dz

        );


    if (

        length > 0

    ) {


        dx /=

            length;


        dz /=

            length;


        tryMove(

            dx *

            speed,


            dz *

            speed

        );

    }


    if (

        keys.Space &&

        player.grounded

    ) {


        player.velocityY =

            0.16;


        player.grounded =

            false;

    }


    player.velocityY -=

        0.012;


    player.y +=

        player.velocityY;


    if (

        player.y <= 2

    ) {


        player.y =

            2;


        player.velocityY =

            0;


        player.grounded =

            true;

    }


    camera.position.set(

        player.x,

        player.y,

        player.z

    );


    camera.rotation.order =

        "YXZ";


    camera.rotation.y =

        yaw;


    camera.rotation.x =

        pitch;

}


// =====================================================
// EXIT CHECK
// =====================================================


function checkExit() {


    if (

        !playing ||

        paused

    ) {


        return;

    }


    const distance =

        Math.hypot(

            player.x -

            exitPosition.x,


            player.z -

            exitPosition.z

        );


    if (

        distance < 1.6

    ) {


        completeLevel();

    }

}


// =====================================================
// LEVEL COMPLETE
// =====================================================


function completeLevel() {


    playing =

        false;


    if (

        document.pointerLockElement

    ) {


        document.exitPointerLock();

    }


    const time =

        (

            performance.now() -

            startTime

        ) /

        1000;


    if (

        currentLevel >=

        unlockedLevel

    ) {


        unlockedLevel =

            Math.min(

                3,

                currentLevel +

                1

            );


        localStorage.setItem(

            "spiritMazeLevel",

            unlockedLevel

        );

    }


    document

    .getElementById(

        "resultText"

    )

    .textContent =

        "Your time: " +

        time.toFixed(

            2

        ) +

        " seconds";


    document

    .getElementById(

        "message"

    )

    .style.display =

        "block";


    document

    .getElementById(

        "pauseButton"

    )

    .style.display =

        "none";


    updateMenu();

}


// =====================================================
// PAUSE
// =====================================================


function togglePause() {


    if (

        !playing

    ) {


        return;

    }


    paused =

        !paused;


    document

    .getElementById(

        "pauseMenu"

    )

    .style.display =

        paused

            ? "flex"

            : "none";


    if (

        paused &&

        document.pointerLockElement

    ) {


        document.exitPointerLock();

    }

}

// =====================================================
// MENU UPDATE
// =====================================================


function updateMenu() {


    for (

        let i = 1;

        i <= 3;

        i++

    ) {


        const button =

            document

            .getElementById(

                "level" +

                i

            );


        if (

            i <=

        ) {


            button

            .classList

            .remove(

            );


            button

            .textContent =

        }

    }

}


updateMenu();

function updateTimer() {


    if (

    ) {

            (

                performance.now() -

function animate() {


    requestAnimationFrame(

        animate

    updateLightningAnimation();


    movePlayer();


    checkExit();


    updateTimer();


    if (

        exitGroup

    ) {


        exitGroup.rotation.y +=

            0.002;

    }


    renderer.render(

        scene,

        camera

    );

}
