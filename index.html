```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>AI World Simulator</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        #game {
            width: 100%;
            height: 100%;
        }

    </style>

</head>

<body>

    <div id="game"></div>


    <!-- Three.js -->

    <script type="module">

        import * as THREE
        from
        "https://cdn.jsdelivr.net/npm/three@0.179.1/build/three.module.js";


        // ==========================================
        // SCENE
        // ==========================================

        const scene =
            new THREE.Scene();


        scene.background =
            new THREE.Color(
                0x87CEEB
            );


        // ==========================================
        // CAMERA
        // ==========================================

        const camera =
            new THREE.PerspectiveCamera(

                60,

                window.innerWidth /
                window.innerHeight,

                0.1,

                1000

            );


        camera.position.set(

            10,
            10,
            10

        );


        camera.lookAt(

            0,
            0,
            0

        );


        // ==========================================
        // RENDERER
        // ==========================================

        const renderer =
            new THREE.WebGLRenderer({

                antialias: true

            });


        renderer.setSize(

            window.innerWidth,

            window.innerHeight

        );


        renderer.setPixelRatio(

            Math.min(

                window.devicePixelRatio,

                2

            )

        );


        document
            .getElementById("game")
            .appendChild(

                renderer.domElement

            );


        // ==========================================
        // LIGHT
        // ==========================================

        const light =
            new THREE.DirectionalLight(

                0xffffff,

                2

            );


        light.position.set(

            10,
            20,
            10

        );


        scene.add(

            light

        );


        const ambient =
            new THREE.AmbientLight(

                0xffffff,

                0.5

            );


        scene.add(

            ambient

        );


        // ==========================================
        // GROUND
        // ==========================================

        const groundGeometry =
            new THREE.PlaneGeometry(

                100,
                100

            );


        const groundMaterial =
            new THREE.MeshStandardMaterial({

                color: 0x4caf50

            });


        const ground =
            new THREE.Mesh(

                groundGeometry,

                groundMaterial

            );


        ground.rotation.x =
            -Math.PI / 2;


        scene.add(

            ground

        );


        // ==========================================
        // BUILDING
        // ==========================================

        const buildingGeometry =
            new THREE.BoxGeometry(

                3,
                5,
                3

            );


        const buildingMaterial =
            new THREE.MeshStandardMaterial({

                color: 0x888888

            });


        const building =
            new THREE.Mesh(

                buildingGeometry,

                buildingMaterial

            );


        building.position.set(

            0,
            2.5,
            0

        );


        scene.add(

            building

        );


        // ==========================================
        // ANIMATION
        // ==========================================

        function animate() {

            requestAnimationFrame(

                animate

            );


            renderer.render(

                scene,

                camera

            );

        }


        animate();


        // ==========================================
        // RESIZE
        // ==========================================

        window.addEventListener(

            "resize",

            () => {

                camera.aspect =

                    window.innerWidth /
                    window.innerHeight;


                camera.updateProjectionMatrix();


                renderer.setSize(

                    window.innerWidth,

                    window.innerHeight

                );

            }

        );

    </script>

</body>

</html>
