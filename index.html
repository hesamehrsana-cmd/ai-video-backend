```html
<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Spirit Maze</title>

<style>

*{
    box-sizing:border-box;
}

html,body{

    margin:0;
    width:100%;
    height:100%;

    overflow:hidden;

    font-family:
    Arial,
    sans-serif;

    background:#07120b;

}

#game{

    position:fixed;

    inset:0;

}

#menu{

    position:fixed;

    inset:0;

    z-index:10;

    display:flex;

    flex-direction:column;

    align-items:center;

    justify-content:center;

    color:white;

    background:

    radial-gradient(
        circle at center,
        rgba(20,70,40,.45),
        rgba(3,10,6,.97)
    );

}

#menu h1{

    font-size:58px;

    margin:0 0 10px;

    letter-spacing:4px;

    text-shadow:
    0 0 20px #54ff9b;

}

#menu p{

    color:#b9d8c5;

    margin-bottom:35px;

}

.levels{

    display:flex;

    gap:18px;

}

.level{

    width:130px;

    height:130px;

    border-radius:18px;

    border:1px solid
    rgba(120,255,170,.4);

    background:
    rgba(20,50,32,.75);

    color:white;

    cursor:pointer;

    font-size:20px;

    transition:.2s;

}

.level:hover{

    transform:
    translateY(-7px);

    box-shadow:
    0 0 25px
    rgba(80,255,150,.5);

}

.level.locked{

    opacity:.35;

    cursor:not-allowed;

}

#hud{

    position:fixed;

    top:15px;

    left:15px;

    z-index:5;

    display:none;

    color:white;

    background:
    rgba(0,0,0,.55);

    padding:12px 16px;

    border-radius:10px;

    direction:ltr;

}

#message{

    position:fixed;

    top:50%;

    left:50%;

    transform:
    translate(-50%,-50%);

    z-index:20;

    color:white;

    text-align:center;

    display:none;

    background:
    rgba(0,0,0,.85);

    padding:30px 45px;

    border-radius:18px;

}

#message h2{

    color:#74ffad;

}

#startHint{

    position:fixed;

    bottom:25px;

    left:50%;

    transform:
    translateX(-50%);

    z-index:5;

    color:white;

    background:
    rgba(0,0,0,.55);

    padding:10px 20px;

    border-radius:20px;

    display:none;

}

</style>

</head>


<body>


<div id="game"></div>


<div id="menu">

    <h1>SPIRIT MAZE</h1>

    <p>
        Enter the maze. Find the exit. Escape.
    </p>

    <div class="levels">

        <button
        class="level"
        id="level1">

        LEVEL 1

        <br>

        <small>BEGINNER</small>

        </button>


        <button
        class="level locked"
        id="level2">

        🔒

        <br>

        LEVEL 2

        </button>


        <button
        class="level locked"
        id="level3">

        🔒

        <br>

        LEVEL 3

        </button>

    </div>

</div>


<div id="hud">

    LEVEL:
    <span id="levelNumber">
    1
    </span>

    &nbsp; | &nbsp;

    TIME:
    <span id="timer">
    0.0
    </span>

</div>


<div id="startHint">

    Click to enter the maze

</div>


<div id="message">

    <h2>
    LEVEL COMPLETE
    </h2>

    <p id="resultText"></p>

    <button
    id="nextButton">

    NEXT LEVEL

    </button>

</div>



<script type="module">


import * as THREE from

"https://cdn.jsdelivr.net/npm/three@0.179.1/build/three.module.js";



// =====================================================
// SCENE
// =====================================================


const scene =

new THREE.Scene();


scene.background =

new THREE.Color(

0x78b9d5

);


scene.fog =

new THREE.Fog(

0x78b9d5,

35,

110

);



// =====================================================
// CAMERA
// =====================================================


const camera =

new THREE.PerspectiveCamera(

70,

window.innerWidth /
window.innerHeight,

0.1,

300

);


camera.position.set(

0,

5,

0

);



// =====================================================
// RENDERER
// =====================================================


const renderer =

new THREE.WebGLRenderer({

antialias:true,

powerPreference:
"high-performance"

});


renderer.setSize(

window.innerWidth,

window.innerHeight

);


renderer.setPixelRatio(

Math.min(

window.devicePixelRatio,

1.25

)

);


renderer.outputColorSpace =

THREE.SRGBColorSpace;


document

.getElementById("game")

.appendChild(

renderer.domElement

);



// =====================================================
// LIGHT
// =====================================================


const sun =

new THREE.DirectionalLight(

0xffffff,

1.8

);


sun.position.set(

20,

40,

20

);


scene.add(sun);



const ambient =

new THREE.HemisphereLight(

0x9ddfff,

0x233a27,

1.3

);


scene.add(ambient);



// =====================================================
// MATERIALS
// =====================================================


const grassMaterial =

new THREE.MeshStandardMaterial({

color:0x286b35,

roughness:1

});


const groundMaterial =

new THREE.MeshStandardMaterial({

color:0x4f8747,

roughness:1

});


const pathMaterial =

new THREE.MeshStandardMaterial({

color:0x756d50,

roughness:1

});


const exitMaterial =

new THREE.MeshStandardMaterial({

color:0x62ffad,

emissive:0x23ff82,

emissiveIntensity:2

});



// =====================================================
// GAME VARIABLES
// =====================================================


let currentLevel = 1;

let mazeSize = 11;

let cellSize = 4;

let maze = [];

let mazeGroup = null;

let exitPosition = null;

let startTime = 0;

let playing = false;

let spiritMode = false;

let unlockedLevel =

Number(

localStorage.getItem(

"spiritMazeLevel"

) || 1

);



// =====================================================
// PLAYER
// =====================================================


const player = {

    x:0,

    z:0,

    y:2,

    velocityY:0,

    grounded:true

};



// =====================================================
// CONTROLS
// =====================================================


const keys = {};

let yaw = 0;

let pitch = 0;



window.addEventListener(

"keydown",

e => {

    keys[e.code] = true;

});


window.addEventListener(

"keyup",

e => {

    keys[e.code] = false;

});



// =====================================================
// MAZE GENERATION
// =====================================================


function generateMaze(size){

    const grid = [];

    for(let z=0;z<size;z++){

        grid[z]=[];

        for(let x=0;x<size;x++){

            grid[z][x]=1;

        }

    }


    function carve(x,z){

        grid[z][x]=0;


        const directions=[

            [2,0],

            [-2,0],

            [0,2],

            [0,-2]

        ];


        directions.sort(

            () => Math.random()-.5

        );


        for(

            const [dx,dz]

            of directions

        ){

            const nx=x+dx;

            const nz=z+dz;


            if(

                nx>0 &&

                nx<size-1 &&

                nz>0 &&

                nz<size-1 &&

                grid[nz][nx]===1

            ){

                grid[

                    z+dz/2

                ][

                    x+dx/2

                ]=0;


                carve(nx,nz);

            }

        }

    }


    carve(1,1);


    return grid;

}



// =====================================================
// BUILD MAZE
// =====================================================


function buildMaze(){

    if(mazeGroup){

        scene.remove(

            mazeGroup

        );

    }


    mazeGroup =

    new THREE.Group();


    scene.add(

        mazeGroup

    );


    maze =

    generateMaze(

        mazeSize

    );


    const total =

    mazeSize * cellSize;


    // Ground


    const ground =

    new THREE.Mesh(

        new THREE.PlaneGeometry(

            total,

            total

        ),

        groundMaterial

    );


    ground.rotation.x=

    -Math.PI/2;


    mazeGroup.add(

        ground

    );


    // Walls


    for(

        let z=0;

        z<mazeSize;

        z++

    ){

        for(

            let x=0;

            x<mazeSize;

            x++

        ){

            if(

                maze[z][x]===1

            ){

                const wall =

                new THREE.Mesh(

                    new THREE.BoxGeometry(

                        cellSize,

                        4,

                        cellSize

                    ),

                    grassMaterial

                );


                wall.position.set(

                    (

                        x -

                        mazeSize/2

                    ) *

                    cellSize,

                    2,

                    (

                        z -

                        mazeSize/2

                    ) *

                    cellSize

                );


                mazeGroup.add(

                    wall

                );

            }

        }

    }


    // Exit


    exitPosition={

        x:

        (

            mazeSize-2 -

            mazeSize/2

        )*

        cellSize,

        z:

        (

            mazeSize-2 -

            mazeSize/2

        )*

        cellSize

    };


    const exit =

    new THREE.Mesh(

        new THREE.CylinderGeometry(

            1.2,

            1.2,

            .2,

            24

        ),

        exitMaterial

    );


    exit.position.set(

        exitPosition.x,

        .15,

        exitPosition.z

    );


    mazeGroup.add(

        exit

    );

}



// =====================================================
// SPIRIT
// =====================================================


const spirit =

new THREE.Mesh(

    new THREE.SphereGeometry(

        .6,

        16,

        16

    ),

    new THREE.MeshBasicMaterial({

        color:0x8affc2,

        transparent:true,

        opacity:.8

    })

);


scene.add(

    spirit

);


spirit.visible=false;



// =====================================================
// START LEVEL
// =====================================================


function startLevel(level){

    currentLevel=

    level;


    mazeSize=

    11 +

    (

        level-1

    )*

    4;


    if(

        mazeSize%2===0

    ){

        mazeSize++;

    }


    buildMaze();


    player.x=

    (

        1 -

        mazeSize/2

    )*

    cellSize;


    player.z=

    (

        1 -

        mazeSize/2

    )*

    cellSize;


    player.y=2;


    camera.position.set(

        player.x,

        25,

        player.z

    );


    yaw=0;

    pitch=

    -Math.PI/2;


    spiritMode=true;

    playing=false;


    spirit.visible=true;


    spirit.position.set(

        player.x,

        25,

        player.z

    );


    document

    .getElementById(

        "menu"

    )

    .style.display=

    "none";


    document

    .getElementById(

        "hud"

    )

    .style.display=

    "block";


    document

    .getElementById(

        "startHint"

    )

    .style.display=

    "block";


    document

    .getElementById(

        "levelNumber"

    )

    .textContent=

    level;

}



// =====================================================
// SPIRIT DESCENT
// =====================================================


function updateSpirit(){

    if(

        !spiritMode

    ) return;


    spirit.position.y-=

    .15;


    camera.position.y=

    spirit.position.y;


    if(

        spirit.position.y<=

        player.y

    ){

        spiritMode=false;

        spirit.visible=false;

        playing=true;

        startTime=

        performance.now();

        camera.position.y=

        player.y;


        document

        .getElementById(

            "startHint"

        )

        .style.display=

        "none";

    }

}



// =====================================================
// POINTER LOCK
// =====================================================


renderer.domElement.addEventListener(

"click",

()=>{

    if(

        playing

    ){

        renderer

        .domElement

        .requestPointerLock();

    }

});



document.addEventListener(

"mousemove",

e=>{

    if(

        document

        .pointerLockElement!==

        renderer.domElement

    ) return;


    yaw-=

    e.movementX*

    .003;


    pitch-=

    e.movementY*

    .003;


    pitch=

    Math.max(

        -1.4,

        Math.min(

            1.4,

            pitch

        )

    );

});



// =====================================================
// COLLISION
// =====================================================


function canMove(

    x,

    z

){

    const gx=

    Math.floor(

        x/cellSize +

        mazeSize/2

    );


    const gz=

    Math.floor(

        z/cellSize +

        mazeSize/2

    );


    if(

        gx<0 ||

        gz<0 ||

        gx>=mazeSize ||

        gz>=mazeSize

    ){

        return false;

    }


    return maze[gz][gx]===0;

}



// =====================================================
// PLAYER MOVEMENT
// =====================================================


function movePlayer(){

    if(

        !playing

    ) return;


    const speed=

    .12;


    const forward=

    new THREE.Vector3(

        -Math.sin(yaw),

        0,

        -Math.cos(yaw)

    );


    const right=

    new THREE.Vector3(

        Math.cos(yaw),

        0,

        -Math.sin(yaw)

    );


    let dx=0;

    let dz=0;


    if(keys.KeyW){

        dx+=forward.x;

        dz+=forward.z;

    }


    if(keys.KeyS){

        dx-=forward.x;

        dz-=forward.z;

    }


    if(keys.KeyA){

        dx-=right.x;

        dz-=right.z;

    }


    if(keys.KeyD){

        dx+=right.x;

        dz+=right.z;

    }


    const length=

    Math.hypot(

        dx,

        dz

    );


    if(length>0){

        dx/=length;

        dz/=length;


        const nx=

        player.x+

        dx*

        speed;


        const nz=

        player.z+

        dz*

        speed;


        if(

            canMove(

                nx,

                player.z

            )

        ){

            player.x=nx;

        }


        if(

            canMove(

                player.x,

                nz

            )

        ){

            player.z=nz;

        }

    }


    // Jump


    if(

        keys.Space &&

        player.grounded

    ){

        player.velocityY=

        .22;

        player.grounded=

        false;

    }


    player.velocityY-=

    .012;


    player.y+=

    player.velocityY;


    if(

        player.y<=2

    ){

        player.y=2;

        player.velocityY=0;

        player.grounded=true;

    }


    camera.position.set(

        player.x,

        player.y,

        player.z

    );


    camera.rotation.order=

    "YXZ";


    camera.rotation.y=

    yaw;


    camera.rotation.x=

    pitch;

}



// =====================================================
// EXIT CHECK
// =====================================================


function checkExit(){

    if(

        !playing

    ) return;


    const distance=

    Math.hypot(

        player.x-

        exitPosition.x,

        player.z-

        exitPosition.z

    );


    if(

        distance<1.5

    ){

        completeLevel();

    }

}



// =====================================================
// COMPLETE
// =====================================================


function completeLevel(){

    playing=false;


    const time=

    (

        performance.now()-

        startTime

    )/

    1000;


    const oldBest=

    localStorage.getItem(

        "level"+

        currentLevel+

        "Best"

    );


    if(

        !oldBest ||

        time<Number(oldBest)

    ){

        localStorage.setItem(

            "level"+

            currentLevel+

            "Best",

            time

        );

    }


    if(

        currentLevel>=

        unlockedLevel

    ){

        unlockedLevel=

        Math.min(

            3,

            currentLevel+1

        );


        localStorage.setItem(

            "spiritMazeLevel",

            unlockedLevel

        );

    }


    document

    .getElementById(

        "resultText"

    )

    .textContent=

    "Your time: "+

    time.toFixed(2)+

    " seconds";


    document

    .getElementById(

        "message"

    )

    .style.display=

    "block";

}



// =====================================================
// LEVEL BUTTONS
// =====================================================


document

.getElementById(

    "level1"

)

.addEventListener(

"click",

()=>{

    startLevel(1);

});



document

.getElementById(

    "level2"

)

.addEventListener(

"click",

()=>{

    if(

        unlockedLevel>=2

    ){

        startLevel(2);

    }

});



document

.getElementById(

    "level3"

)

.addEventListener(

"click",

()=>{

    if(

        unlockedLevel>=3

    ){

        startLevel(3);

    }

});



// =====================================================
// NEXT
// =====================================================


document

.getElementById(

    "nextButton"

)

.addEventListener(

"click",

()=>{

    document

    .getElementById(

        "message"

    )

    .style.display=

    "none";


    if(

        currentLevel<3

    ){

        startLevel(

            currentLevel+1

        );

    }

});



// =====================================================
// UPDATE LEVEL LOCKS
// =====================================================


function updateMenu(){

    for(

        let i=1;

        i<=3;

        i++

    ){

        const button=

        document

        .getElementById(

            "level"+i

        );


        if(

            i<=unlockedLevel

        ){

            button

            .classList

            .remove(

                "locked"

            );


            button

            .textContent=

            "LEVEL "+i;

        }

    }

}


updateMenu();



// =====================================================
// TIMER
// =====================================================


function updateTimer(){

    if(

        playing

    ){

        const time=

        (

            performance.now()-

            startTime

        )/

        1000;


        document

        .getElementById(

            "timer"

        )

        .textContent=

        time.toFixed(1);

    }

}



// =====================================================
// LOOP
// =====================================================


function animate(){

    requestAnimationFrame(

        animate

    );


    updateSpirit();

    movePlayer();

    checkExit();

    updateTimer();


    renderer.render(

        scene,

        camera

    );

}


animate();



// =====================================================
// RESIZE
// =====================================================


window.addEventListener(

"resize",

()=>{

    camera.aspect=

    window.innerWidth/

    window.innerHeight;


    camera.updateProjectionMatrix();


    renderer.setSize(

        window.innerWidth,

        window.innerHeight

    );

});

</script>

</body>

</html>
