
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>Modern 3D Architecture</title>

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html,
body {

    width: 100%;
    height: 100%;

    overflow: hidden;

    background: #87ceeb;

}

#game {

    width: 100%;
    height: 100%;

}

#info {

    position: fixed;

    top: 15px;
    left: 15px;

    z-index: 20;

    padding: 14px 18px;

    color: white;

    font-family: Arial,
    sans-serif;

    font-size: 14px;

    line-height: 1.7;

    background:
    rgba(5, 8, 15, 0.78);

    border-radius: 12px;

    backdrop-filter:
    blur(8px);

}

#stats {

    position: fixed;

    top: 15px;
    right: 15px;

    z-index: 20;

    padding: 9px 14px;

    color: #8cffc1;

    font-family: monospace;

    background:
    rgba(0, 0, 0, 0.65);

    border-radius: 9px;

}

#crosshair {

    position: fixed;

    left: 50%;
    top: 50%;

    transform:
    translate(-50%, -50%);

    z-index: 20;

    color: white;

    font-size: 20px;

    pointer-events: none;

    text-shadow:
    0 0 5px black;

}

</style>

</head>


<body>


<div id="info">

🏢 Modern Architecture Demo

<br>

🖱️ Click = Look Around

<br>

<br>

<br>

<br>

</div>


<div id="stats">

</div>


<div id="crosshair">

+

</div>

<script type="module">


import * as THREE from

"https://cdn.jsdelivr.net/npm/three@0.179.1/build/three.module.js";

const scene =

new THREE.Scene();


scene.background =

new THREE.Color(

0x8acdf0

);


scene.fog =

new THREE.Fog(

0x8acdf0,

70,

220

);

const camera =

new THREE.PerspectiveCamera(

72,

window.innerWidth /

window.innerHeight,

0.1,

500

);


camera.position.set(

0,

5,

38

);

const renderer =

new THREE.WebGLRenderer({

antialias: true,

"high-performance"

renderer.setSize(

window.innerWidth,

window.innerHeight

renderer.setPixelRatio(

Math.min(

window.devicePixelRatio,

);


renderer.shadowMap.enabled = true;


renderer.shadowMap.type =

THREE.PCFSoftShadowMap;


renderer.outputColorSpace =

THREE.SRGBColorSpace;


renderer.toneMapping =

THREE.ACESFilmicToneMapping;


renderer.toneMappingExposure =

1.15;


document

.getElementById("game")

.appendChild(

renderer.domElement

);



// =====================================================
// LIGHTING
// =====================================================


const sun =

new THREE.DirectionalLight(

0xffffff,

2.4

);


sun.position.set(

35,

55,

25

);


sun.castShadow = true;


sun.shadow.mapSize.width =

1536;


sun.shadow.mapSize.height =

1536;


sun.shadow.camera.left = -80;


sun.shadow.camera.right = 80;


sun.shadow.camera.top = 80;


sun.shadow.camera.bottom = -80;


scene.add(sun);



const skyLight =

new THREE.HemisphereLight(

0x9edfff,

0x35452f,

1.15

);


scene.add(skyLight);



// =====================================================
// MATERIALS
// =====================================================


const wallMaterial =

new THREE.MeshStandardMaterial({

color: 0xbfc2c5,

roughness: 0.72,

metalness: 0.03

});


const darkWall =

new THREE.MeshStandardMaterial({

color: 0x30343a,

});


const stoneMaterial =

new THREE.MeshStandardMaterial({

color: 0x777b7e,

});


const metalMaterial =

new THREE.MeshStandardMaterial({

color: 0x25282c,

});


const woodMaterial =

new THREE.MeshStandardMaterial({

color: 0x56331f,

roughness: 0.7

});



// =====================================================
// GLASS
// =====================================================


const glassMaterial =

new THREE.MeshPhysicalMaterial({

color: 0x6dbdd7,

roughness: 0.07,

metalness: 0.1,

transmission: 0.28,

transparent: true,

opacity: 0.72,

side: THREE.DoubleSide

});



// =====================================================
// INTERIOR GLASS
// =====================================================


const interiorGlass =

new THREE.MeshStandardMaterial({

color: 0x111820,

roughness: 0.2

});



// =====================================================
// WARM INTERIOR LIGHT
// =====================================================


const warmMaterial =

new THREE.MeshStandardMaterial({

color: 0xffc86b,

emissive: 0xff9d32,

emissiveIntensity: 1.5

});



// =====================================================
// HELPERS
// =====================================================


function box(

w,

h,

d,

material,

x,

y,

z,

parent = scene

) {


const mesh =

new THREE.Mesh(

new THREE.BoxGeometry(

w,

h,

d

),

material

);


mesh.position.set(

x,

y,

z

);


mesh.castShadow = true;


mesh.receiveShadow = true;


parent.add(mesh);


return mesh;

}



// =====================================================
// GROUND
// =====================================================


box(

220,

0.2,

220,

new THREE.MeshStandardMaterial({

color: 0x4d9148,

roughness: 1

}),

0,

-0.1,

0

);



// =====================================================
// ROAD
// =====================================================


box(

18,

0.15,

220,

new THREE.MeshStandardMaterial({

color: 0x242629,

roughness: 0.9

}),

0,

0,

0

);



// =====================================================
// SIDEWALK
// =====================================================


box(

4,

0.3,

220,

stoneMaterial,

-11,

0.15,

0

);


box(

4,

0.3,

220,

stoneMaterial,

11,

0.15,

0

);



// =====================================================
// ROAD MARKINGS
// =====================================================


const markingMaterial =

new THREE.MeshStandardMaterial({

color: 0xf5f5f5

});


for (

let z = -100;

z < 110;

z += 10

) {


box(

0.3,

0.04,

5,

markingMaterial,

0,

0.1,

z

);

}



// =====================================================
// BUILDING GROUP
// =====================================================


const building =

new THREE.Group();


scene.add(building);



// =====================================================
// MAIN BUILDING
// =====================================================


box(

27,

20,

20,

wallMaterial,

0,

10,

0,

building

);



// =====================================================
// ANGLED ARCHITECTURAL SIDES
// =====================================================


// Left angled wing


const leftWing =

new THREE.Mesh(

new THREE.CylinderGeometry(

5,

7,

20,

4,

1

),

darkWall

);


leftWing.scale.z = 0.45;


leftWing.rotation.y =

Math.PI / 4;


leftWing.position.set(

-14,

10,

0

);


leftWing.castShadow = true;


building.add(leftWing);



// Right angled wing


const rightWing =

leftWing.clone();


rightWing.position.x =

14;


building.add(rightWing);



// =====================================================
// FRONT FACADE LAYERS
// =====================================================


for (

let y = 2;

y <= 18;

y += 4

) {


box(

28,

0.25,

0.5,

darkWall,

0,

y,

-10.25,

building

);

}



// Vertical facade elements


for (

let x = -13;

x <= 13;

x += 6.5

) {


box(

0.35,

19,

0.5,

metalMaterial,

x,

10,

-10.45,

building

);

}



// =====================================================
// INTERIOR ROOMS
// =====================================================


function createInteriorRoom(

x,

y

) {


const room =

new THREE.Group();



// Dark back wall


box(

5.4,

3.2,

0.25,

interiorGlass,

x,

y,

-9.4,

room

);



// Floor


box(

5.4,

0.12,

3.8,

woodMaterial,

x,

y - 1.55,

-8.7,

room

);



// Ceiling


box(

5.4,

0.1,

3.8,

darkWall,

x,

y + 1.55,

-8.7,

room

);



// Sofa


box(

2.3,

0.65,

0.8,

woodMaterial,

x,

y - 0.75,

-8.5,

room

);



// Table


const table =

new THREE.Mesh(

new THREE.CylinderGeometry(

0.45,

0.45,

0.08,

16

),

stoneMaterial

);


table.position.set(

x,

y - 0.35,

-8.5

);


room.add(table);



// Warm lamp


const lamp =

new THREE.Mesh(

new THREE.SphereGeometry(

0.22,

12,

12

),

warmMaterial

);


lamp.position.set(

x,

y + 0.9,

-8.6

);


room.add(lamp);



building.add(room);

}



// Create visible rooms


createInteriorRoom(-7, 3.8);


createInteriorRoom(0, 3.8);


createInteriorRoom(7, 3.8);


createInteriorRoom(-7, 7.8);


createInteriorRoom(0, 7.8);


createInteriorRoom(7, 7.8);


createInteriorRoom(-7, 11.8);


createInteriorRoom(0, 11.8);


createInteriorRoom(7, 11.8);


createInteriorRoom(-7, 15.8);


createInteriorRoom(0, 15.8);


createInteriorRoom(7, 15.8);



// =====================================================
// WINDOWS
// =====================================================


function createWindow(

x,

y

) {


const group =

new THREE.Group();



// Glass


const glass =

new THREE.Mesh(

new THREE.BoxGeometry(

5.3,

3.2,

0.12

),

glassMaterial

);


group.add(glass);



// Frame left


box(

0.13,

3.4,

0.22,

metalMaterial,

x - 2.7,

y,

-10.5,

group

);



// Frame right


box(

0.13,

3.4,

0.22,

metalMaterial,

x + 2.7,

y,

-10.5,

group

);



// Top


box(

5.5,

0.13,

0.22,

metalMaterial,

x,

y + 1.65,

-10.5,

group

);



// Bottom


box(

5.5,

0.13,

0.22,

metalMaterial,

x,

y - 1.65,

-10.5,

group

);



// Center divider


box(

0.1,

3.1,

0.22,

metalMaterial,

x,

y,

-10.52,

group

);



building.add(group);

}



// Window rows


for (

let floor = 0;

floor < 4;

floor++

) {


for (

let column = -1;

column <= 1;

column++

) {


createWindow(

column * 7,

3.8 + floor * 4

);

}

}



// =====================================================
// ANGLED BALCONIES
// =====================================================


function createBalcony(

x,

y

) {


const balcony =

new THREE.Group();



// Balcony floor


box(

5.8,

0.3,

3.2,

stoneMaterial,

x,

y,

-12,

balcony

);



// Back support


box(

5.5,

0.3,

0.3,

darkWall,

x,

y,

-10.5,

balcony

);



// Rail posts


for (

let i = -2;

i <= 2;

i++

) {


const post =

new THREE.Mesh(

new THREE.CylinderGeometry(

0.055,

0.055,

1.3,

8

),

metalMaterial

);


post.position.set(

x + i * 1.2,

y + 0.75,

-13.3

);


balcony.add(post);

}



// Front rail


box(

5.3,

0.12,

0.12,

metalMaterial,

x,

y + 1.4,

-13.3,

balcony

);



// Side rails


box(

0.12,

1.3,

2.7,

metalMaterial,

x - 2.65,

y + 0.7,

-12,

balcony

);


box(

0.12,

1.3,

2.7,

metalMaterial,

x + 2.65,

y + 0.7,

-12,

balcony

);



building.add(balcony);

}



// Correctly projecting outward


createBalcony(-7, 7.8);


createBalcony(7, 15.8);



// =====================================================
// MAIN ENTRANCE
// =====================================================


box(

9,

7,

0.6,

darkWall,

0,

3.5,

-10.8

);



// Entrance glass


box(

3.5,

5.2,

0.15,

glassMaterial,

-1.9,

2.6,

-11.15

);


box(

3.5,

5.2,

0.15,

glassMaterial,

1.9,

2.6,

-11.15

);



// Entrance canopy


const canopy =

new THREE.Mesh(

new THREE.CylinderGeometry(

4.5,

3.5,

0.5,

4

),

metalMaterial

);


canopy.rotation.y =

Math.PI / 4;


canopy.scale.z =

0.35;


canopy.position.set(

0,

7.3,

-12

);


building.add(canopy);



// =====================================================
// COLUMNS
// =====================================================


function column(x) {


const c =

new THREE.Mesh(

new THREE.CylinderGeometry(

0.65,

0.8,

7,

16

),

stoneMaterial

);


c.position.set(

x,

3.5,

-11.5

);


c.castShadow = true;


scene.add(c);

}



column(-4.7);


column(4.7);



// =====================================================
// STAIRS
// =====================================================


for (

let i = 0;

i < 6;

i++

) {


box(

12 - i * 0.6,

0.35,

1,

stoneMaterial,

0,

0.2 + i * 0.35,

-12 - i,

building

);

}



// =====================================================
// ROOF
// =====================================================


box(

28,

0.8,

21,

darkWall,

0,

20.5,

0,

building

);



// Angled roof decoration


const roofShape =

new THREE.Mesh(

new THREE.ConeGeometry(

15,

4,

4

),

darkWall

);


roofShape.scale.z =

0.7;


roofShape.position.set(

0,

23,

0

);


roofShape.rotation.y =

Math.PI / 4;


building.add(roofShape);



// =====================================================
// ROOFTOP EQUIPMENT
// =====================================================


for (

let x = -7;

x <= 7;

x += 7

) {


const tank =

new THREE.Mesh(

new THREE.CylinderGeometry(

1.25,

1.25,

2.5,

20

),

metalMaterial

);


tank.position.set(

x,

22.2,

0

);


tank.castShadow = true;


building.add(tank);

}



// =====================================================
// TREES
// =====================================================


function createTree(

x,

z,

scale = 1

) {


const tree =

new THREE.Group();



// Trunk


const trunk =

new THREE.Mesh(

new THREE.CylinderGeometry(

0.35,

0.5,

3,

10

),

woodMaterial

);


trunk.position.y =

1.5;


tree.add(trunk);



// Foliage


const leafMaterial =

new THREE.MeshStandardMaterial({

color: 0x287d35,

roughness: 0.9

});



for (

let i = 0;

i < 6;

i++

) {


const leaf =

new THREE.Mesh(

new THREE.IcosahedronGeometry(

1.3,

1

),

leafMaterial

);


leaf.position.set(

Math.sin(i * 2.1),

3.1 + (i % 3) * 0.5,

Math.cos(i * 2.1)

);


tree.add(leaf);

}



tree.position.set(

x,

0,

z

);


tree.scale.setScalar(

scale

);


scene.add(tree);

}



createTree(-16, -10, 1.3);


createTree(16, -10, 1.3);


createTree(-16, 10, 1.1);


createTree(16, 10, 1.1);



// =====================================================
// STREET LIGHTS
// =====================================================


function streetLight(

x,

z

) {


const pole =

new THREE.Mesh(

new THREE.CylinderGeometry(

0.1,

0.14,

6,

10

),

metalMaterial

);


pole.position.set(

x,

3,

z

);


scene.add(pole);



const lamp =

new THREE.Mesh(

new THREE.SphereGeometry(

0.35,

12,

12

),

warmMaterial

);


lamp.position.set(

x,

6.2,

z

);


scene.add(lamp);

}



streetLight(-8,

-22);


streetLight(8,

-22);


streetLight(-8,

22);


streetLight(8,

22);



// =====================================================
// MOVEMENT
// =====================================================


const keys = {};



window.addEventListener(

"keydown",

e => {

keys[e.code] = true;

});



window.addEventListener(

"keyup",

e => {

keys[e.code] = false;

});



let yaw = 0;

let pitch = 0;



const speed = 0.18;



// =====================================================
// MOUSE LOOK
// =====================================================


renderer.domElement.addEventListener(

"click",

() => {

renderer.domElement.requestPointerLock();

});



document.addEventListener(

"mousemove",

event => {


if (

document.pointerLockElement !==

renderer.domElement

) return;



// Faster mouse movement


yaw -=

event.movementX * 0.004;



pitch -=

event.movementY * 0.004;



pitch =

Math.max(

-Math.PI / 2,

Math.min(

Math.PI / 2,

pitch

)

);

});



// =====================================================
// PLAYER MOVEMENT
// =====================================================


function movePlayer() {


const forward =

new THREE.Vector3();


const right =

new THREE.Vector3();


const direction =

new THREE.Vector3();



camera.getWorldDirection(

forward

);


forward.y = 0;


forward.normalize();



right.crossVectors(

forward,

camera.up

).normalize();



if (

keys.KeyW

)

direction.add(forward);



if (

keys.KeyS

)

direction.sub(forward);



if (

keys.KeyA

)

direction.sub(right);



if (

keys.KeyD

)

direction.add(right);



if (

direction.length() > 0

) {


direction.normalize();


camera.position.addScaledVector(

direction,

speed

);

}



if (

keys.Space

)

camera.position.y += speed;



if (

keys.ShiftLeft ||

keys.ShiftRight

)

camera.position.y -= speed;



camera.position.y =

Math.max(

1,

camera.position.y

);

}



// =====================================================
// CAMERA
// =====================================================


function updateCamera() {


camera.rotation.order =

"YXZ";


camera.rotation.y =

yaw;


camera.rotation.x =

pitch;

}



// =====================================================
// FPS
// =====================================================


let frames = 0;

let lastTime =

performance.now();



function updateFPS() {


frames++;



const now =

performance.now();



if (

now - lastTime >= 1000

) {


document

.getElementById("stats")

.textContent =

"FPS: " +

frames;



frames = 0;


lastTime = now;

}

}



// =====================================================
// ANIMATION
// =====================================================


function animate() {


requestAnimationFrame(

animate

);


movePlayer();


updateCamera();


updateFPS();



renderer.render(

scene,

camera

);

}


animate();



// =====================================================
// RESIZE
// =====================================================


window.addEventListener(

"resize",

() => {


camera.aspect =

window.innerWidth /

window.innerHeight;


camera.updateProjectionMatrix();



renderer.setSize(

window.innerWidth,

window.innerHeight

);

});



</script>

</body>

</html>
