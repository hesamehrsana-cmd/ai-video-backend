// =====================================================
// MAZE GENERATOR
// =====================================================


function generateMaze(size) {


    const grid = [];


    for (

        let z = 0;

        z < size;

        z++

    ) {


        grid[z] = [];


        for (

            let x = 0;

            x < size;

            x++

        ) {


            grid[z][x] = 1;

        }

    }


    function carve(x, z) {


        grid[z][x] = 0;


        const directions = [

            [2, 0],

            [-2, 0],

            [0, 2],

            [0, -2]

        ];


        directions.sort(

            () =>

                Math.random() -

                0.5

        );


        for (

            const [dx, dz]

            of directions

        ) {


            const nx =

                x + dx;


            const nz =

                z + dz;


            if (

                nx > 0 &&

                nx < size - 1 &&

                nz > 0 &&

                nz < size - 1 &&

                grid[nz][nx] === 1

            ) {


                grid[

                    z + dz / 2

                ][

                    x + dx / 2

                ] = 0;


                carve(

                    nx,

                    nz

                );

            }

        }

    }


    carve(

        1,

        1

    );


    return grid;

}

function createAncientWall(

// =====================================================
// BUILD MAZE
// =====================================================


function buildMaze() {


    if (

        mazeGroup

    ) {


        scene.remove(

            mazeGroup

        );

    }


    mazeGroup =

        new THREE.Group();


    scene.add(

        mazeGroup

    );


    wallColliders = [];


    maze =

        generateMaze(

            mazeSize

        );


    const total =

        mazeSize *

        cellSize;


    // Ground

    const ground =

        new THREE.Mesh(

            new THREE.PlaneGeometry(

                total,

                total

            ),

            groundMaterial

        );


    ground.rotation.x =

        -Math.PI / 2;


    ground.receiveShadow =

        true;


    mazeGroup.add(

        ground

    );


    // Walls

    for (

        let z = 0;

        z < mazeSize;

        z++

    ) {


        for (

            let x = 0;

            x < mazeSize;

            x++

        ) {


            if (

                maze[z][x] === 1

            ) {


                const wallX =

                    (

                        x -

                        mazeSize / 2

                    ) *

                    cellSize;


                const wallZ =

                    (

                        z -

                        mazeSize / 2

                    ) *

                    cellSize;


                mazeGroup.add(

                    createAncientWall(

                        wallX,

                        wallZ

                    )

                );


                wallColliders.push({

                    minX:

                        wallX -

                        cellSize / 2,

                    maxX:

                        wallX +

                        cellSize / 2,

                    minZ:

                        wallZ -

                        cellSize / 2,

                    maxZ:

                        wallZ +

                        cellSize / 2

                });

            }

        }

    }


    createExit();

}

// =====================================================
// COLLISION
// =====================================================


function circleIntersectsWall(

    x,

    z,

    wall

) {


    const closestX =

        Math.max(

            wall.minX,

            Math.min(

                x,

                wall.maxX

            )

        );


    const closestZ =

        Math.max(

            wall.minZ,

            Math.min(

                z,

                wall.maxZ

            )

        );


    const dx =

        x -

        closestX;


    const dz =

        z -

        closestZ;


    return (

        dx * dx +

        dz * dz

    ) <

    (

        playerRadius *

        playerRadius

    );

}


function collidesWithWall(

    x,

    z

) {


    for (

        const wall

        of wallColliders

    ) {


        if (

            circleIntersectsWall(

                x,

                z,

                wall

            )

        ) {


            return true;

        }

    }


    return false;

}


// =====================================================
// MOVEMENT
// =====================================================


function tryMove(

    dx,

    dz

) {


    const nextX =

        player.x +

        dx;


    const nextZ =

        player.z +

        dz;


    if (

        !collidesWithWall(

            nextX,

            nextZ

        )

    ) {


        player.x =

            nextX;


        player.z =

            nextZ;


        return;

    }


    if (

        !collidesWithWall(

            nextX,

            player.z

        )

    ) {


        player.x =

            nextX;

    }


    if (

        !collidesWithWall(

            player.x,

            nextZ

        )

    ) {


        player.z =

            nextZ;

    }

}


// =====================================================

renderer.domElement.addEventListener(

document.addEventListener(

            Math.max(

);


// =====================================================
// PLAYER

function movePlayer() {

        paused ||

        introAnimation

    ) {


        return;

        -Math.sin(

        -Math.cos(

            yaw

        );

        Math.cos(

            yaw

        );

        -Math.sin(

            yaw

        keys.KeyW

            forwardX;


        dz +=

            forwardZ;

        keys.KeyS

    ) {


        dx -=

            forwardX;


        dz -=

            forwardZ;

    }


    if (

        keys.KeyA

    ) {


        dx -=

            rightX;


        dz -=

            rightZ;

    }


    if (

        keys.KeyD

    ) {


        dx +=

            rightX;


        dz +=

            rightZ;

    }


    const length =

        Math.hypot(

            dx,

            dz

        );


    if (

        length > 0

    ) {


        dx /=

            length;


        dz /=

            length;


        tryMove(

            dx *

            speed,


            dz *

            speed

        );

    }


    if (

        keys.Space &&

        player.grounded

    ) {


        player.velocityY =

            0.16;


        player.grounded =

            false;

    }


    player.velocityY -=

        0.012;


    player.y +=

        player.velocityY;


    if (

        player.y <= 2

    ) {


        player.y =

            2;


        player.velocityY =

            0;


        player.grounded =

            true;

    }


    camera.position.set(

        player.x,

        player.y,

        player.z

    );


    camera.rotation.order =

        "YXZ";


    camera.rotation.y =

        yaw;


    camera.rotation.x =

        pitch;

}


// =====================================================
// EXIT CHECK
// =====================================================


function checkExit() {


    if (

        !playing ||

        paused

    ) {


        return;

    }


    const distance =

        Math.hypot(

            player.x -

            exitPosition.x,


            player.z -

            exitPosition.z

        );


    if (

        distance < 1.6

    ) {


        completeLevel();

    }

}


// =====================================================
// COMPLETE
// =====================================================


function completeLevel() {


    playing =

        false;


    if (

        document.pointerLockElement

    ) {


        document.exitPointerLock();

    }


    const time =

        (

            performance.now() -

            startTime

        ) /

        1000;


    if (

        currentLevel >=

        unlockedLevel

    ) {


        unlockedLevel =

            Math.min(

                3,

                currentLevel +

                1

            );


        localStorage.setItem(

            "ancientMazeLevel",

            unlockedLevel

        );

    }


    document

    .getElementById(

        "resultText"

    )

    .textContent =

        "Your time: " +

        time.toFixed(

            2

        ) +

        " seconds";


    document

    .getElementById(

        "message"

    )

    .style.display =

        "block";


    document

    .getElementById(

        "pauseButton"

    )

    .style.display =

        "none";


    updateMenu();

}


// =====================================================
// PAUSE
// =====================================================


function togglePause() {


    if (

        !playing

    ) {


        return;

    }


    paused =

        !paused;


    document

    .getElementById(

        "pauseMenu"

    )

    .style.display =

        paused

            ? "flex"

            : "none";


    if (

        paused &&

        document.pointerLockElement

    ) {


        document.exitPointerLock();

    }

}

// BUTTONS
// =====================================================


document

.getElementById(

    "pauseButton"

)

.addEventListener(

    togglePause

);


document

.getElementById(

    "resumeButton"

)

.addEventListener(

    "click",

    togglePause

);


document

.getElementById(

    "restartButton"

)

.addEventListener(

    "click",

    () => {


        document

        .getElementById(

            "pauseMenu"

        )

        .style.display =

            "none";


        startLevel(

            currentLevel

        );

    }

);


document

.getElementById(

    "menuButton"

)

.addEventListener(

    "click",

    () => {


        playing =

            false;


        paused =

            false;


        if (

            document.pointerLockElement

        ) {


            document.exitPointerLock();

        }


        document

        .getElementById(

            "pauseMenu"

        )

        .style.display =

            "none";


        document

        .getElementById(

            "hud"

        )

        .style.display =

        document

        .getElementById(

            "pauseButton"

        )

        .style.display =

            "none";


        document

        .getElementById(

            "menu"

        )

        .style.display =

            "flex";

    }

);


// =====================================================
// LEVELS

document

.getElementById(

    "level1"

)

.addEventListener(

    "click",

    () =>

        startLevel(

            1

        )

);


document

.getElementById(

    "level2"

)

.addEventListener(

        if (

            unlockedLevel >=

            2

        ) {


            startLevel(

                2

            );

        }

    }

);


document

.getElementById(

    "level3"

)

.addEventListener(

    "click",

        if (

            unlockedLevel >=

        ) {

            );

    }

);


// =====================================================
// NEXT LEVEL
// =====================================================


document

.getElementById(

    "nextButton"

)

.addEventListener(

    () => {


        document

        .getElementById(

            "message"

        )

        .style.display =

        if (

        ) {


            startLevel(

                currentLevel +

                1

            );

        }

    }

);


// =====================================================
// MENU UPDATE
// =====================================================


function updateMenu() {


    for (

        let i = 1;

        i <= 3;

        i++

    ) {


        const button =

            document

            .getElementById(

                "level" +

                i

            );


        if (

            i <=

            unlockedLevel

        ) {


            button

            .classList

            .remove(

                "locked"

            );


            button

            .textContent =

                "LEVEL " +

                i;

        }

    }

}


updateMenu();


// =====================================================
// TIMER
// =====================================================


function updateTimer() {


    if (

        playing &&

        !paused

    ) {


        const time =

            (

                performance.now() -

                startTime

            ) /

            1000;


        document

        .getElementById(

            "timer"

        )

        .textContent =

            time.toFixed(

                1

            );

    }

}

function animate() {


    requestAnimationFrame(

        animate

    );


    movePlayer();


    checkExit();


    updateTimer();


    if (

        exitGroup

    ) {


        exitGroup.rotation.y +=

            0.002;

    }


    renderer.render(

        scene,

        camera

    );

}


animate();

        camera.aspect =

);
