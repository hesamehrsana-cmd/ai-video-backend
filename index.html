
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>AI World Simulator</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {

            width: 100%;
            height: 100%;

            overflow: hidden;

            background: #87CEEB;

        }

        #game {

            width: 100%;
            height: 100%;

        }

        #info {

            position: fixed;

            top: 20px;
            left: 20px;

            padding: 14px 18px;

            background:
                rgba(0, 0, 0, 0.7);

            color: white;

            border-radius: 10px;

            font-family: Arial,
            sans-serif;

            line-height: 1.7;

            z-index: 10;

        }

        #crosshair {

            position: fixed;

            left: 50%;
            top: 50%;

            transform:
                translate(-50%, -50%);

            color: white;

            font-size: 22px;

            pointer-events: none;

            z-index: 20;

            text-shadow:
                0 0 5px black;

        }

    </style>

</head>


<body>


<div id="info">

    🌍 AI World Simulator

    <br>

    🖱️ Click = Control Camera

    <br>

    W A S D = Move

    <br>

    Space = Up

    <br>

    Shift = Down

    <br>

    ESC = Release Mouse

</div>


<div id="crosshair">

    +

</div>


<div id="game"></div>



<script type="module">


import * as THREE from

"https://cdn.jsdelivr.net/npm/three@0.179.1/build/three.module.js";



// ==========================================
// SCENE
// ==========================================


const scene =

new THREE.Scene();


scene.background =

new THREE.Color(

    0x87CEEB

);



// ==========================================
// CAMERA
// ==========================================


const camera =

new THREE.PerspectiveCamera(

    75,

    window.innerWidth /

    window.innerHeight,

    0.1,

    1000

);


camera.position.set(

    0,

    5,

    20

);



// ==========================================
// RENDERER
// ==========================================


const renderer =

new THREE.WebGLRenderer({

    antialias: true

});


renderer.setSize(

    window.innerWidth,

    window.innerHeight

);


renderer.setPixelRatio(

    Math.min(

        window.devicePixelRatio,

        2

    )

);


document

.getElementById("game")

.appendChild(

    renderer.domElement

);



// ==========================================
// LIGHT
// ==========================================


const sun =

new THREE.DirectionalLight(

    0xffffff,

    2

);


sun.position.set(

    20,

    30,

    20

);


scene.add(

    sun

);



const ambient =

new THREE.AmbientLight(

    0xffffff,

    0.7

);


scene.add(

    ambient

);



// ==========================================
// GROUND
// ==========================================


const groundGeometry =

new THREE.PlaneGeometry(

    200,

    200

);


const groundMaterial =

new THREE.MeshStandardMaterial({

    color: 0x4caf50

});


const ground =

new THREE.Mesh(

    groundGeometry,

    groundMaterial

);


ground.rotation.x =

-Math.PI / 2;


scene.add(

    ground

);



// ==========================================
// ROAD
// ==========================================


const roadGeometry =

new THREE.PlaneGeometry(

    12,

    200

);


const roadMaterial =

new THREE.MeshStandardMaterial({

    color: 0x333333

});


const road =

new THREE.Mesh(

    roadGeometry,

    roadMaterial

);


road.rotation.x =

-Math.PI / 2;


road.position.y =

0.02;


scene.add(

    road

);



// ==========================================
// BUILDINGS
// ==========================================


function createBuilding(

    x,

    z,

    width,

    height,

    depth,

    color

) {


    const geometry =

    new THREE.BoxGeometry(

        width,

        height,

        depth

    );


    const material =

    new THREE.MeshStandardMaterial({

        color: color

    });


    const building =

    new THREE.Mesh(

        geometry,

        material

    );


    building.position.set(

        x,

        height / 2,

        z

    );


    scene.add(

        building

    );

}



createBuilding(

    -10,

    -10,

    6,

    12,

    6,

    0x888888

);


createBuilding(

    10,

    -15,

    8,

    8,

    8,

    0x777777

);


createBuilding(

    -12,

    15,

    5,

    6,

    5,

    0x999999

);


createBuilding(

    12,

    12,

    7,

    15,

    7,

    0x666666

);



// ==========================================
// TREES
// ==========================================


function createTree(

    x,

    z

) {


    const trunkGeometry =

    new THREE.CylinderGeometry(

        0.5,

        0.5,

        3

    );


    const trunkMaterial =

    new THREE.MeshStandardMaterial({

        color: 0x8B4513

    });


    const trunk =

    new THREE.Mesh(

        trunkGeometry,

        trunkMaterial

    );


    trunk.position.set(

        x,

        1.5,

        z

    );


    scene.add(

        trunk

    );



    const leavesGeometry =

    new THREE.SphereGeometry(

        2.5,

        16,

        16

    );


    const leavesMaterial =

    new THREE.MeshStandardMaterial({

        color: 0x228B22

    });


    const leaves =

    new THREE.Mesh(

        leavesGeometry,

        leavesMaterial

    );


    leaves.position.set(

        x,

        4,

        z

    );


    scene.add(

        leaves

    );

}



// Trees


createTree(

    -5,

    -5

);


createTree(

    6,

    -5

);


createTree(

    -6,

    7

);


createTree(

    7,

    7

);



// ==========================================
// PLAYER
// ==========================================


const player = {

    speed: 0.15,

    velocityY: 0,

    gravity: 0.01

};



// ==========================================
// KEYBOARD
// ==========================================


const keys = {};



window.addEventListener(

    "keydown",

    (event) => {

        keys[event.code] = true;

    }

);



window.addEventListener(

    "keyup",

    (event) => {

        keys[event.code] = false;

    }

);



// ==========================================
// MOUSE LOOK
// ==========================================


let yaw = 0;

let pitch = 0;



renderer.domElement.addEventListener(

    "click",

    () => {

        renderer.domElement
            .requestPointerLock();

    }

);



document.addEventListener(

    "mousemove",

    (event) => {


        if (

            document.pointerLockElement !==

            renderer.domElement

        ) {

            return;

        }


        const sensitivity =

        0.002;


        yaw -=

        event.movementX *

        sensitivity;


        pitch -=

        event.movementY *

        sensitivity;


        pitch =

        Math.max(

            -Math.PI / 2,

            Math.min(

                Math.PI / 2,

                pitch

            )

        );

    }

);



// ==========================================
// MOVEMENT
// ==========================================


function movePlayer() {


    const direction =

    new THREE.Vector3();


    const forward =

    new THREE.Vector3();


    const right =

    new THREE.Vector3();



    camera.getWorldDirection(

        forward

    );


    forward.y = 0;


    forward.normalize();



    right.crossVectors(

        forward,

        camera.up

    ).normalize();



    if (

        keys["KeyW"]

    ) {

        direction.add(

            forward

        );

    }



    if (

        keys["KeyS"]

    ) {

        direction.sub(

            forward

        );

    }



    if (

        keys["KeyA"]

    ) {

        direction.sub(

            right

        );

    }



    if (

        keys["KeyD"]

    ) {

        direction.add(

            right

        );

    }



    if (

        direction.length() > 0

    ) {

        direction.normalize();


        camera.position.x +=

        direction.x *

        player.speed;


        camera.position.z +=

        direction.z *

        player.speed;

    }



    // UP


    if (

        keys["Space"]

    ) {

        camera.position.y +=

        player.speed;

    }



    // DOWN


    if (

        keys["ShiftLeft"] ||

        keys["ShiftRight"]

    ) {

        camera.position.y -=

        player.speed;

    }



    // Minimum height


    if (

        camera.position.y < 1

    ) {

        camera.position.y = 1;

    }

}



// ==========================================
// CAMERA ROTATION
// ==========================================


function updateCameraRotation() {


    camera.rotation.order =

    "YXZ";


    camera.rotation.y =

    yaw;


    camera.rotation.x =

    pitch;

}



// ==========================================
// ANIMATION
// ==========================================


function animate() {


    requestAnimationFrame(

        animate

    );


    movePlayer();


    updateCameraRotation();


    renderer.render(

        scene,

        camera

    );

}


animate();



// ==========================================
// RESIZE
// ==========================================


window.addEventListener(

    "resize",

    () => {


        camera.aspect =

        window.innerWidth /

        window.innerHeight;


        camera.updateProjectionMatrix();


        renderer.setSize(

            window.innerWidth,

            window.innerHeight

        );

    }

);


</script>


</body>

</html>
```
