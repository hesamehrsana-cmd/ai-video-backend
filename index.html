function createWindow(

x,

z

const group =

// Frames


const framePositions = [

group.add(frame);

// =====================================================
// MOVEMENT
// =====================================================


const keys = {};


window.addEventListener(

"keydown",

event => {

keys[event.code] = true;

});


window.addEventListener(

"keyup",

event => {

keys[event.code] = false;

});



let yaw = 0;

let pitch = 0;


const speed = 0.18;



renderer.domElement.addEventListener(

"click",

() => {

renderer.domElement.requestPointerLock();

});



document.addEventListener(

"mousemove",

event => {


if (

document.pointerLockElement !==

renderer.domElement

) return;



yaw -=

event.movementX * 0.002;



pitch -=

event.movementY * 0.002;



pitch =

Math.max(

-Math.PI / 2,

Math.min(

Math.PI / 2,

pitch

)

);

});



// =====================================================
// MOVEMENT FUNCTION

function movePlayer() {


const forward =

new THREE.Vector3();


const right =

new THREE.Vector3();


const direction =

new THREE.Vector3();



camera.getWorldDirection(

forward

);


forward.y = 0;


forward.normalize();



right.crossVectors(

forward,

camera.up

).normalize();



if (

keys.KeyW

)

direction.add(forward);



if (

keys.KeyS

)

direction.sub(forward);



if (

keys.KeyA

)

direction.sub(right);



if (

keys.KeyD

)

direction.add(right);



if (

direction.length() > 0

) {


direction.normalize();



camera.position.addScaledVector(

direction,

speed

);

}



if (

keys.Space

)

camera.position.y += speed;



if (

keys.ShiftLeft ||

keys.ShiftRight

)

camera.position.y -= speed;



camera.position.y =

Math.max(

1,

camera.position.y

);

}



// =====================================================

// =====================================================


function updateCamera() {


camera.rotation.order =

"YXZ";


camera.rotation.y =

yaw;


camera.rotation.x =

pitch;

}



// =====================================================

// =====================================================


let frames = 0;

performance.now();



function updateFPS() {


frames++;



const now =

performance.now();



if (

now - lastTime >= 1000

) {

.getElementById("stats")

.textContent =

"FPS: " +

frames;



frames = 0;


lastTime = now;

}

}



// =====================================================

function animate() {


requestAnimationFrame(

animate

movePlayer();


updateCamera();


updateFPS();



renderer.render(

);

}


animate();



// =====================================================

window.addEventListener(

"resize",

() => {


camera.aspect =

window.innerWidth /

window.innerHeight;

window.innerWidth,

);

});
