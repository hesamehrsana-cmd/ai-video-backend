<script type="module">


import * as THREE from

"https://cdn.jsdelivr.net/npm/three@0.179.1/build/three.module.js";



// =====================================================
// SCENE
// =====================================================


const scene =

new THREE.Scene();


scene.background =

new THREE.Color(

0x78b9d5

);


scene.fog =

new THREE.Fog(

0x78b9d5,

45,

130

);



// =====================================================
// CAMERA
// =====================================================


const camera =

new THREE.PerspectiveCamera(

70,

window.innerWidth /

window.innerHeight,

0.1,

300

);


camera.position.set(

0,

25,

0

);



// =====================================================
// RENDERER
// =====================================================


const renderer =

new THREE.WebGLRenderer({

    antialias: true,

    powerPreference:
        "high-performance"

});


renderer.setSize(

window.innerWidth,

window.innerHeight

);


renderer.setPixelRatio(

Math.min(

    window.devicePixelRatio,

    1.25

)

);


renderer.outputColorSpace =

THREE.SRGBColorSpace;


document

.getElementById(

    "game"

)

.appendChild(

    renderer.domElement

);



// =====================================================
// LIGHT
// =====================================================


const sun =

new THREE.DirectionalLight(

0xffffff,

1.8

);


sun.position.set(

20,

50,

20

);


scene.add(

sun

);



const ambient =

new THREE.HemisphereLight(

0xa9ddff,

0x203c26,

1.4

);


scene.add(

ambient

);



// =====================================================
// MATERIALS
// =====================================================


const grassMaterial =

new THREE.MeshStandardMaterial({

    color: 0x245f2f,

    roughness: 1,

    metalness: 0,

    transparent: false,

    opacity: 1

});


const groundMaterial =

new THREE.MeshStandardMaterial({

    color: 0x527d45,

    roughness: 1

});


const exitMaterial =

new THREE.MeshStandardMaterial({

    color: 0x67ffad,

    emissive: 0x20ff7d,

    emissiveIntensity: 2

});



// =====================================================
// GAME VARIABLES
// =====================================================


let currentLevel = 1;

let mazeSize = 11;

const cellSize = 4;

let maze = [];

let mazeGroup = null;

let exitPosition = null;

let startTime = 0;

let playing = false;

let introAnimation = false;

let unlockedLevel =

Number(

    localStorage.getItem(

        "spiritMazeLevel"

    ) || 1

);



// =====================================================
// COLLISION SETTINGS
// =====================================================


const playerRadius = 0.42;

const wallHeight = 6;

let wallColliders = [];



// =====================================================
// PLAYER
// =====================================================


const player = {

    x: 0,

    z: 0,

    y: 2,

    velocityY: 0,

    grounded: true

};



// =====================================================
// CAMERA ROTATION
// =====================================================


let yaw = 0;

let pitch = 0;



// =====================================================
// INPUT
// =====================================================


const keys = {};



window.addEventListener(

    "keydown",

    e => {

        keys[e.code] = true;

    }

);



window.addEventListener(

    "keyup",

    e => {

        keys[e.code] = false;

    }

);



// =====================================================
// MAZE GENERATOR
// =====================================================


function generateMaze(size) {


    const grid = [];


    for (

        let z = 0;

        z < size;

        z++

    ) {


        grid[z] = [];


        for (

            let x = 0;

            x < size;

            x++

        ) {


            grid[z][x] = 1;

        }

    }



    function carve(x, z) {


        grid[z][x] = 0;


        const directions = [


            [2, 0],


            [-2, 0],


            [0, 2],


            [0, -2]


        ];


        directions.sort(

            () => Math.random() - 0.5

        );


        for (

            const [dx, dz]

            of directions

        ) {


            const nx = x + dx;

            const nz = z + dz;


            if (

                nx > 0 &&

                nx < size - 1 &&

                nz > 0 &&

                nz < size - 1 &&

                grid[nz][nx] === 1

            ) {


                grid[

                    z + dz / 2

                ][

                    x + dx / 2

                ] = 0;


                carve(

                    nx,

                    nz

                );

            }

        }

    }



    carve(

        1,

        1

    );


    return grid;

}



// =====================================================
// BUILD MAZE
// =====================================================


function buildMaze() {


    if (

        mazeGroup

    ) {


        scene.remove(

            mazeGroup

        );

    }



    mazeGroup =

    new THREE.Group();


    scene.add(

        mazeGroup

    );



    wallColliders = [];



    maze =

    generateMaze(

        mazeSize

    );



    const total =

    mazeSize *

    cellSize;



    // =================================================
    // GROUND
    // =================================================


    const ground =

    new THREE.Mesh(

        new THREE.PlaneGeometry(

            total,

            total

        ),

        groundMaterial

    );


    ground.rotation.x =

    -Math.PI / 2;


    mazeGroup.add(

        ground

    );



    // =================================================
    // WALLS
    // =================================================


    for (

        let z = 0;

        z < mazeSize;

        z++

    ) {


        for (

            let x = 0;

            x < mazeSize;

            x++

        ) {


            if (

                maze[z][x] === 1

            ) {


                const wallX =

                (

                    x -

                    mazeSize / 2

                ) *

                cellSize;



                const wallZ =

                (

                    z -

                    mazeSize / 2

                ) *

                cellSize;



                // Visual wall


                const wall =

                new THREE.Mesh(

                    new THREE.BoxGeometry(

                        cellSize,

                        wallHeight,

                        cellSize

                    ),

                    grassMaterial

                );


                wall.position.set(

                    wallX,

                    wallHeight / 2,

                    wallZ

                );


                mazeGroup.add(

                    wall

                );



                // Collision box


                wallColliders.push({

                    minX:

                    wallX -

                    cellSize / 2,


                    maxX:

                    wallX +

                    cellSize / 2,


                    minZ:

                    wallZ -

                    cellSize / 2,


                    maxZ:

                    wallZ +

                    cellSize / 2

                });

            }

        }

    }



    // =================================================
    // EXIT
    // =================================================


    exitPosition = {


        x:

        (

            mazeSize - 2 -

            mazeSize / 2

        ) *

        cellSize,


        z:

        (

            mazeSize - 2 -

            mazeSize / 2

        ) *

        cellSize

    };



    const exit =

    new THREE.Mesh(

        new THREE.CylinderGeometry(

            1.2,

            1.2,

            0.15,

            24

        ),

        exitMaterial

    );


    exit.position.set(

        exitPosition.x,

        0.08,

        exitPosition.z

    );


    mazeGroup.add(

        exit

    );

}



// =====================================================
// SPIRIT
// =====================================================


const spiritGroup =

new THREE.Group();


scene.add(

    spiritGroup

);



const spiritCore =

new THREE.Mesh(

    new THREE.SphereGeometry(

        0.55,

        16,

        16

    ),

    new THREE.MeshBasicMaterial({

        color: 0x9affd0,

        transparent: true,

        opacity: 0.9

    })

);


spiritGroup.add(

    spiritCore

);



const spiritGlow =

new THREE.PointLight(

0x5dffae,

5,

15

);


spiritGroup.add(

    spiritGlow

);



spiritGroup.visible =

false;



// =====================================================
// SPIRIT INTRO
// =====================================================


let spiritTime = 0;



function startSpiritAnimation() {


    introAnimation = true;

    playing = false;

    spiritTime = 0;


    spiritGroup.visible =

    true;


    spiritGroup.position.set(

        player.x,

        24,

        player.z

    );


    camera.position.set(

        player.x,

        28,

        player.z

    );


    camera.lookAt(

        player.x,

        0,

        player.z

    );

}



function updateSpiritAnimation() {


    if (

        !introAnimation

    )

        return;



    spiritTime +=

    0.016;



    const t =

    Math.min(

        spiritTime / 6,

        1

    );



    const ease =

    t *

    t *

    (

        3 -

        2 *

        t

    );



    const targetY =

    2.3;



    const y =

    24 +

    (

        targetY -

        24

    ) *

    ease;



    const orbitRadius =

    Math.max(

        0,

        5 *

        (

            1 -

            ease

        )

    );



    spiritGroup.position.set(

        player.x +

        Math.sin(

            spiritTime * 2

        ) *

        orbitRadius,

        y,

        player.z +

        Math.cos(

            spiritTime * 2

        ) *

        orbitRadius

    );



    const cameraHeight =

    28 -

    24 *

    ease;



    camera.position.set(

        player.x,

        cameraHeight,

        player.z

    );



    camera.lookAt(

        player.x,

        1,

        player.z

    );



    if (

        t >= 1

    ) {


        introAnimation = false;


        spiritGroup.visible =

        false;



        camera.position.set(

            player.x,

            player.y,

            player.z

        );



        yaw = 0;

        pitch = 0;



        camera.rotation.set(

            0,

            0,

            0

        );



        const flash =

        document

        .getElementById(

            "spiritFlash"

        );



        flash.animate(

            [

                {

                    opacity: 0

                },

                {

                    opacity: 1

                },

                {

                    opacity: 0

                }

            ],

            {

                duration: 700

            }

        );



        setTimeout(

            () => {


                playing = true;


                startTime =

                performance.now();


            },

            500

        );

    }

}



// =====================================================
// START LEVEL
// =====================================================


function startLevel(level) {


    currentLevel =

    level;


    mazeSize =

    11 +

    (

        level - 1

    ) *

    4;



    if (

        mazeSize % 2 === 0

    ) {


        mazeSize++;

    }



    buildMaze();



    player.x =

    (

        1 -

        mazeSize / 2

    ) *

    cellSize;



    player.z =

    (

        1 -

        mazeSize / 2

    ) *

    cellSize;



    player.y = 2;

    player.velocityY = 0;

    player.grounded = true;



    document

    .getElementById(

        "menu"

    )

    .style.display =

    "none";



    document

    .getElementById(

        "hud"

    )

    .style.display =

    "block";



    document

    .getElementById(

        "startHint"

    )

    .style.display =

    "block";



    document

    .getElementById(

        "levelNumber"

    )

    .textContent =

    level;



    startSpiritAnimation();

}



// =====================================================
// COLLISION
// =====================================================


function circleIntersectsWall(

    x,

    z,

    wall

) {


    const closestX =

    Math.max(

        wall.minX,

        Math.min(

            x,

            wall.maxX

        )

    );



    const closestZ =

    Math.max(

        wall.minZ,

        Math.min(

            z,

            wall.maxZ

        )

    );



    const dx =

    x -

    closestX;



    const dz =

    z -

    closestZ;



    return (

        dx * dx +

        dz * dz

    ) <

    (

        playerRadius *

        playerRadius

    );

}



function collidesWithWall(

    x,

    z

) {


    for (

        const wall

        of wallColliders

    ) {


        if (

            circleIntersectsWall(

                x,

                z,

                wall

            )

        ) {


            return true;

        }

    }



    return false;

}



// =====================================================
// SAFE MOVEMENT
// =====================================================


function tryMove(

    dx,

    dz

) {


    const nextX =

    player.x +

    dx;



    const nextZ =

    player.z +

    dz;



    // Full movement


    if (

        !collidesWithWall(

            nextX,

            nextZ

        )

    ) {


        player.x =

        nextX;



        player.z =

        nextZ;



        return;

    }



    // Slide X


    if (

        !collidesWithWall(

            nextX,

            player.z

        )

    ) {


        player.x =

        nextX;

    }



    // Slide Z


    if (

        !collidesWithWall(

            player.x,

            nextZ

        )

    ) {


        player.z =

        nextZ;

    }

}



// =====================================================
// POINTER LOCK
// =====================================================


renderer

.domElement

.addEventListener(

    "click",

    () => {


        if (

            playing

        ) {


            renderer

            .domElement

            .requestPointerLock();

        }

    }

);



document.addEventListener(

    "mousemove",

    e => {


        if (

            document

            .pointerLockElement !==

            renderer.domElement

        ) {


            return;

        }



        yaw -=

        e.movementX *

        0.0025;



        pitch -=

        e.movementY *

        0.0025;



        pitch =

        Math.max(

            -1.45,

            Math.min(

                1.45,

                pitch

            )

        );

    }

);



// =====================================================
// PLAYER MOVEMENT
// =====================================================


function movePlayer() {


    if (

        !playing

    )

        return;



    const speed =

    0.11;



    let forwardX =

    -Math.sin(

        yaw

    );



    let forwardZ =

    -Math.cos(

        yaw

    );



    let rightX =

    Math.cos(

        yaw

    );



    let rightZ =

    -Math.sin(

        yaw

    );



    let dx = 0;

    let dz = 0;



    if (

        keys.KeyW

    ) {


        dx +=

        forwardX;


        dz +=

        forwardZ;

    }



    if (

        keys.KeyS

    ) {


        dx -=

        forwardX;


        dz -=

        forwardZ;

    }



    if (

        keys.KeyA

    ) {


        dx -=

        rightX;


        dz -=

        rightZ;

    }



    if (

        keys.KeyD

    ) {


        dx +=

        rightX;


        dz +=

        rightZ;

    }



    const length =

    Math.hypot(

        dx,

        dz

    );



    if (

        length > 0

    ) {


        dx /=

        length;



        dz /=

        length;



        tryMove(

            dx *

            speed,

            dz *

            speed

        );

    }



    // =================================================
    // JUMP
    // =================================================


    if (

        keys.Space &&

        player.grounded

    ) {


        player.velocityY =

        0.16;



        player.grounded =

        false;

    }



    player.velocityY -=

    0.012;



    player.y +=

    player.velocityY;



    if (

        player.y <= 2

    ) {


        player.y = 2;


        player.velocityY = 0;


        player.grounded =

        true;

    }



    // =================================================
    // CAMERA
    // =================================================


    camera.position.set(

        player.x,

        player.y,

        player.z

    );



    camera.rotation.order =

    "YXZ";



    camera.rotation.y =

    yaw;



    camera.rotation.x =

    pitch;

}



// =====================================================
// EXIT CHECK
// =====================================================


function checkExit() {


    if (

        !playing

    )

        return;



    const distance =

    Math.hypot(

        player.x -

        exitPosition.x,

        player.z -

        exitPosition.z

    );



    if (

        distance < 1.4

    ) {


        completeLevel();

    }

}



// =====================================================
// LEVEL COMPLETE
// =====================================================


function completeLevel() {


    playing = false;



    if (

        document.pointerLockElement

    ) {


        document.exitPointerLock();

    }



    const time =

    (

        performance.now() -

        startTime

    ) / 1000;



    const oldBest =

    localStorage.getItem(

        "level" +

        currentLevel +

        "Best"

    );



    if (

        !oldBest ||

        time <

        Number(

            oldBest

        )

    ) {


        localStorage.setItem(

            "level" +

            currentLevel +

            "Best",

            time

        );

    }



    if (

        currentLevel >=

        unlockedLevel

    ) {


        unlockedLevel =

        Math.min(

            3,

            currentLevel + 1

        );



        localStorage.setItem(

            "spiritMazeLevel",

            unlockedLevel

        );

    }



    document

    .getElementById(

        "resultText"

    )

    .textContent =

    "Your time: " +

    time.toFixed(2) +

    " seconds";



    document

    .getElementById(

        "message"

    )

    .style.display =

    "block";



    updateMenu();

}



// =====================================================
// MENU UPDATE
// =====================================================


function updateMenu() {


    for (

        let i = 1;

        i <= 3;

        i++

    ) {


        const button =

        document

        .getElementById(

            "level" + i

        );



        if (

            i <=

            unlockedLevel

        ) {


            button

            .classList

            .remove(

                "locked"

            );


            button

            .textContent =

            "LEVEL " +

            i;

        }

    }

}



updateMenu();



// =====================================================
// LEVEL BUTTONS
// =====================================================


document

.getElementById(

    "level1"

)

.addEventListener(

    "click",

    () => {


        startLevel(

            1

        );

    }

);



document

.getElementById(

    "level2"

)

.addEventListener(

    "click",

    () => {


        if (

            unlockedLevel >= 2

        ) {


            startLevel(

                2

            );

        }

    }

);



document

.getElementById(

    "level3"

)

.addEventListener(

    "click",

    () => {


        if (

            unlockedLevel >= 3

        ) {


            startLevel(

                3

            );

        }

    }

);



// =====================================================
// NEXT LEVEL
// =====================================================


document

.getElementById(

    "nextButton"

)

.addEventListener(

    "click",

    () => {


        document

        .getElementById(

            "message"

        )

        .style.display =

        "none";



        if (

            currentLevel < 3

        ) {


            startLevel(

                currentLevel + 1

            );

        }

    }

);



// =====================================================
// TIMER
// =====================================================


function updateTimer() {


    if (

        playing

    ) {


        const time =

        (

            performance.now() -

            startTime

        ) / 1000;



        document

        .getElementById(

            "timer"

        )

        .textContent =

        time.toFixed(

            1

        );

    }

}



// =====================================================
// MAIN LOOP
// =====================================================


function animate() {


    requestAnimationFrame(

        animate

    );


    updateSpiritAnimation();


    movePlayer();


    checkExit();


    updateTimer();



    renderer.render(

        scene,

        camera

    );

}



animate();



// =====================================================
// RESIZE
// =====================================================


window.addEventListener(

    "resize",

    () => {


        camera.aspect =

        window.innerWidth /

        window.innerHeight;



        camera.updateProjectionMatrix();
