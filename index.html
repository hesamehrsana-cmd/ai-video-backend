<script type="module">


import * as THREE from

"https://cdn.jsdelivr.net/npm/three@0.179.1/build/three.module.js";



// =================================================
// SCENE

const scene =

new THREE.Scene();


scene.background =

// =================================================
// CAMERA

const camera =

const renderer =

);

.getElementById("game")

.appendChild(

);



// =================================================
// LIGHTING

const sun =

);

);



// =================================================

const groundGeometry =

new THREE.PlaneGeometry(

300,

300

);

color: 0x4caf50

// =================================================
// ROAD
// =================================================


function createRoad(

x,

z,

width,

length,

rotation = 0

) {


const roadGeometry =

new THREE.PlaneGeometry(

width,

length

);


const roadMaterial =

new THREE.MeshStandardMaterial({

color: 0x292929

});

);

// =================================================

function createRoadLine(

x,

z,

length,

rotation = 0

) {


const geometry =

new THREE.PlaneGeometry(

0.35,

length

);


const material =

new THREE.MeshStandardMaterial({

color: 0xffffff

});


const line =

new THREE.Mesh(

geometry,

);

);

for (

let z = -95;

) {

// =================================================
// SIDEWALK

function createSidewalk(

x

const geometry =

new THREE.BoxGeometry(

);

);


sidewalk.position.set(

x,

0.15,

0

);

sidewalk

);

createSidewalk(-8.5);

// =================================================
// BUILDING
// =================================================


function createBuilding(

x,

z,

width,

height,

depth,

color

) {


const group =

new THREE.Group();



// Main building


const bodyGeometry =

new THREE.BoxGeometry(

width,

height,

depth

);


const bodyMaterial =

new THREE.MeshStandardMaterial({

color: color

});


const body =

new THREE.Mesh(

bodyGeometry,

bodyMaterial

);


body.position.y =

height / 2;


group.add(

body

);



// Roof


const roofGeometry =

new THREE.BoxGeometry(

width + 0.4,

0.5,

depth + 0.4

);


const roofMaterial =

new THREE.MeshStandardMaterial({

color: 0x333333

});


const roof =

new THREE.Mesh(

roofGeometry,

roofMaterial

);


roof.position.y =

height + 0.25;


group.add(

roof

);



// Door


const doorGeometry =

new THREE.BoxGeometry(

1.5,

2.5,

0.15

);


const doorMaterial =

new THREE.MeshStandardMaterial({

color: 0x4b2e1f

});


const door =

new THREE.Mesh(

doorGeometry,

doorMaterial

);


door.position.set(

0,

1.25,

depth / 2 + 0.08

);


group.add(

door

);



// Door handle


const handleGeometry =

new THREE.SphereGeometry(

0.08,

8,

8

);


const handleMaterial =

new THREE.MeshStandardMaterial({

color: 0xffd700

});


const handle =

new THREE.Mesh(

handleGeometry,

handleMaterial

);


handle.position.set(

0.4,

1.3,

depth / 2 + 0.2

);


group.add(

handle

);



// Windows


const windowMaterial =

new THREE.MeshStandardMaterial({

color: 0x7ddcff,

metalness: 0.2,

roughness: 0.2

});



const windowRows =

Math.max(

1,

Math.floor(

height / 4

)

);


const windowColumns =

Math.max(

1,

Math.floor(

width / 3

)

);



for (

let row = 0;

row < windowRows;

row++

) {


for (

let col = 0;

col < windowColumns;

col++

) {


const windowGeometry =

new THREE.BoxGeometry(

1.2,

1.4,

0.12

);


const win =

new THREE.Mesh(

windowGeometry,

windowMaterial

);


const xPos =

(

col -

(

windowColumns - 1

) / 2

) * 2.2;


const yPos =

3 +

row * 3;


win.position.set(

xPos,

yPos,

depth / 2 + 0.08

);


group.add(

win

);

}

}



// Building position


group.position.set(

x,

0,

z

);


scene.add(

group

);

}



// =================================================

createBuilding(

function createTree(

x,

z

) {


const group =

new THREE.Group();



// Trunk


const trunkGeometry =

new THREE.CylinderGeometry(

0.45,

0.6,

);

);



// Leaves


const leafMaterial =

});



const leaf1 =

new THREE.Mesh(

new THREE.SphereGeometry(

2.2,

12,

12

),

);


leaf1.position.y =

group.add(

leaf1

);



const leaf2 =

new THREE.Mesh(

new THREE.SphereGeometry(

1.7,

12,

12

),

);


leaf2.position.set(

-1,

5,

0

);


group.add(

leaf2

);



const leaf3 =

new THREE.Mesh(

new THREE.SphereGeometry(

1.7,

12,

12

),

leafMaterial

);


leaf3.position.set(

1,

5,

0

);


group.add(

leaf3

);


group.position.set(

x,

0,

z

);


scene.add(

group

);

}



// Trees


createTree(

-11,

-8

);


createTree(

11,

-8

);


createTree(

-11,

);


createTree(

11,

function createStreetLight(

x,

z

) {


const group =

new THREE.Group();



// Pole


const poleGeometry =

new THREE.CylinderGeometry(

0.12,

0.12,

5,

8

);


const poleMaterial =

new THREE.MeshStandardMaterial({

color: 0x333333

});


const pole =

new THREE.Mesh(

poleGeometry,

poleMaterial

);


pole.position.y =

2.5;


group.add(

pole

);



// Lamp


const lampGeometry =

new THREE.SphereGeometry(

0.35,

12,

12

);


const lampMaterial =

new THREE.MeshStandardMaterial({

color: 0xffffaa,

emissive: 0xffff44,

emissiveIntensity: 0.5

});


const lamp =

new THREE.Mesh(

lampGeometry,

lampMaterial

);


lamp.position.y =

5.1;


group.add(

lamp

);


group.position.set(

x,

0,

z

);


scene.add(

group

);

}



// Street lights


createStreetLight(

-7,

-20

);


createStreetLight(

7,

-20

);


createStreetLight(

-7,

);


createStreetLight(

7,

20

);



// =================================================
// CAR
// =================================================


function createCar(

x,

z,

color

) {


const group =

new THREE.Group();



// Body


const bodyGeometry =

new THREE.BoxGeometry(

2.5,

0.7,

4

);


const bodyMaterial =

new THREE.MeshStandardMaterial({

color: color

});


const body =

new THREE.Mesh(

bodyGeometry,

bodyMaterial

);


body.position.y =

0.7;


group.add(

body

);



// Top


const topGeometry =

new THREE.BoxGeometry(

1.8,

0.6,

2

);


const top =

new THREE.Mesh(

topGeometry,

bodyMaterial

);


top.position.y =

1.25;


group.add(

top

);



// Wheels


const wheelMaterial =

new THREE.MeshStandardMaterial({

color: 0x111111

});



const wheelPositions = [

[-1.2, 0.5, -1.3],

[1.2, 0.5, -1.3],

[-1.2, 0.5, 1.3],

[1.2, 0.5, 1.3]

];



for (

const pos of wheelPositions

) {


const wheel =

new THREE.Mesh(

new THREE.CylinderGeometry(

0.45,

0.45,

0.3,

12

),

wheelMaterial

);


wheel.rotation.z =

Math.PI / 2;


wheel.position.set(

pos[0],

pos[1],

pos[2]

);


group.add(

wheel

);

}


group.position.set(

x,

0,

z

);


scene.add(

group

);

}



// Cars


createCar(

-3,

-20,

0xff3333

);


createCar(

3,

20,

0x3366ff

);



// =================================================
// PLAYER
// =================================================


const player = {

speed: 0.15

};


const keys = {};



window.addEventListener(

"keydown",

(event) => {

keys[event.code] = true;

}

);



window.addEventListener(

"keyup",

(event) => {

keys[event.code] = false;

}

);



// =================================================
// MOUSE LOOK
// =================================================


let yaw = 0;

let pitch = 0;



renderer.domElement.addEventListener(

"click",

() => {

renderer.domElement.requestPointerLock();

}

);



document.addEventListener(

"mousemove",

(event) => {


if (

document.pointerLockElement !==

renderer.domElement

) return;


const sensitivity =

0.002;


yaw -=

event.movementX *

sensitivity;


pitch -=

event.movementY *

sensitivity;


pitch =

Math.max(

-Math.PI / 2,

Math.min(

Math.PI / 2,

pitch

)

);

}

);



// =================================================
// MOVEMENT
// =================================================


function movePlayer() {


const direction =

new THREE.Vector3();


const forward =

new THREE.Vector3();


const right =

new THREE.Vector3();


camera.getWorldDirection(

forward

);


forward.y = 0;


forward.normalize();


right.crossVectors(

forward,

camera.up

).normalize();



if (

keys["KeyW"]

)

direction.add(

forward

);



if (

keys["KeyS"]

)

direction.sub(

forward

);



if (

keys["KeyA"]

)

direction.sub(

right

);



if (

keys["KeyD"]

)

direction.add(

right

);



if (

direction.length() > 0

) {


direction.normalize();


camera.position.x +=

direction.x *

player.speed;


camera.position.z +=

direction.z *

player.speed;

}



if (

keys["Space"]

)

camera.position.y +=

player.speed;



if (

keys["ShiftLeft"] ||

keys["ShiftRight"]

)

camera.position.y -=

player.speed;



if (

camera.position.y < 1

)

camera.position.y = 1;

}



// =================================================
// CAMERA ROTATION
// =================================================


function updateCameraRotation() {


camera.rotation.order =

"YXZ";


camera.rotation.y =

yaw;


camera.rotation.x =

pitch;

}



// =================================================
// ANIMATION
// =================================================


function animate() {


requestAnimationFrame(

animate

);


movePlayer();


updateCameraRotation();


renderer.render(

scene,

camera

);

}


animate();



// =================================================
// RESIZE
// =================================================


window.addEventListener(

"resize",

() => {


camera.aspect =

window.innerWidth /

window.innerHeight;


camera.updateProjectionMatrix();


renderer.setSize(

window.innerWidth,

window.innerHeight

);

}

);


</script>

</body>
