function generateMaze(size) {


    const grid = [];



    for (

        let z = 0;

        z < size;

        z++

    ) {


        grid[z] = [];



        for (

            let x = 0;

            x < size;

            x++

        ) {


            grid[z][x] = 1;

        }

    }



    function carve(x, z) {


        grid[z][x] = 0;



        const directions = [


            [2, 0],


            [-2, 0],


            [0, 2],


            [0, -2]


        ];



        directions.sort(

            () => Math.random() - 0.5

        );



        for (

            const [dx, dz]

            of directions

        ) {


            const nx =

            x + dx;



            const nz =

            z + dz;



            if (

                nx > 0 &&

                nx < size - 1 &&

                nz > 0 &&

                nz < size - 1 &&

                grid[nz][nx] === 1

            ) {


                grid[

                    z + dz / 2

                ][

                    x + dx / 2

                ] = 0;



                carve(

                    nx,

                    nz

                );

            }

        }

    }



    carve(

        1,

        1

    );



    return grid;

}



// =====================================================

function createHedge(

    x,

    z

) {


    const group =

    new THREE.Group();



    // Main body

    new THREE.Mesh(

        new THREE.BoxGeometry(

    // Natural leafy chunks


    const count = 10;



    for (

        let i = 0;

        i < count;

        i++

    ) {


        const size =

        0.55 +

        Math.random() *

        0.65;



        const leaf =

        new THREE.Mesh(

            new THREE.IcosahedronGeometry(

                size,

                1

            ),

            Math.random() > 0.5

                ? leafMaterial

                : darkLeafMaterial

        );



        leaf.position.set(

            (

                Math.random() -

                0.5

            3.8,



            2.8 +

            Math.random() *

            3.2,



            (

                Math.random() -

                0.5

            ) *

            3.8

        );



        leaf.rotation.set(

            Math.random(),

            Math.random(),

            Math.random()

        );



        group.add(

            leaf

        );

    }



    group.position.set(

        x,

        0,

        z

    );



    return group;

}

function buildMaze() {


    if (

        mazeGroup

        scene.remove(

            mazeGroup

    mazeGroup =

    new THREE.Group();



    scene.add(

        mazeGroup

    wallColliders = [];



    maze =

    generateMaze(

        mazeSize

    const total =

    mazeSize *

    cellSize;



    // Ground


    const ground =

    new THREE.Mesh(

        new THREE.PlaneGeometry(

            total,

            total

        ),

        groundMaterial

    );



    ground.rotation.x =

    -Math.PI / 2;



    mazeGroup.add(

        ground

    );



    // Walls


    for (

        let z = 0;

        z < mazeSize;

        z++

    ) {


        for (

            let x = 0;

            x < mazeSize;

            x++

        ) {


            if (

                maze[z][x] === 1

            ) {


                const wallX =

                (

                    x -

                    mazeSize / 2

                ) *

                cellSize;



                const wallZ =

                (

                    z -

                    mazeSize / 2

                ) *

                cellSize;



                mazeGroup.add(

                    createHedge(

                        wallX,

                        wallZ

                    )

                );



                wallColliders.push({

                    minX:

                    wallX -

                    cellSize / 2,



                    maxX:

                    wallX +

                    cellSize / 2,



                    minZ:

                    wallZ -

                    cellSize / 2,



                    maxZ:

                    wallZ +

                    cellSize / 2

                });

            }

        }

    }



    createExit();

}

function updateSpiritAnimation() {


    if (

        !introAnimation

        return;



    spiritTime +=

    0.016;



    const t =

    Math.min(

        spiritTime / 6,

        1

    );



    const ease =

    t *

    t *

    (

        3 -

        2 *

        t

    );



    const y =

    24 +

    (

        2.3 -

        24

    ) *

    ease;



    spiritGroup.position.set(

        player.x +

        Math.sin(

            spiritTime * 2

        ) *

        (

            5 *

            (

                1 -

                ease

            )

        ),



        y,



        player.z +

        Math.cos(

            spiritTime * 2

        ) *

        (

            5 *

            (

                ease

// =====================================================
// COLLISION
// =====================================================


function circleIntersectsWall(

    x,

    z,

    wall

) {


    const closestX =

    Math.max(

        wall.minX,

        Math.min(

            x,

            wall.maxX

        )

    );



    const closestZ =

    Math.max(

        wall.minZ,

        Math.min(

            z,

            wall.maxZ

        )

    );



    const dx =

    x -

    closestX;



    const dz =

    z -

    closestZ;



    return (

        dx * dx +

        dz * dz

    ) <

    (

        playerRadius *

        playerRadius

    );

}



function collidesWithWall(

    x,

    z

) {


    for (

        const wall

        of wallColliders

    ) {


        if (

            circleIntersectsWall(

                x,

                z,

                wall

            )

        ) {


            return true;

        }

    }



    return false;

}



// =====================================================
// MOVEMENT
// =====================================================


function tryMove(

    dx,

    dz

) {


    const nextX =

    player.x +

    dx;



    const nextZ =

    player.z +

    dz;



    if (

        !collidesWithWall(

            nextX,

            nextZ

        )

    ) {


        player.x =

        nextX;



        player.z =

        nextZ;



        return;

    }



    if (

        !collidesWithWall(

            nextX,

            player.z

        )

    ) {


        player.x =

        nextX;

    }



    if (

        !collidesWithWall(

            player.x,

            nextZ

        )

    ) {


        player.z =

        nextZ;

    }

}

        forwardX;



        dz +=

        forwardZ;

    if (

        keys.KeyS

        dx -=

        forwardX;



        dz -=

        forwardZ;

    }



    if (

        keys.KeyA

    ) {


        dx -=

        rightX;



        dz -=

        rightZ;

    }



    if (

        keys.KeyD

    ) {


        dx +=

        rightX;



        dz +=

        rightZ;

    }



    const length =

    Math.hypot(

        dx,

        dz

    );



    if (

        length > 0

    ) {


        dx /=

        length;



        dz /=

        length;



        tryMove(

            dx *

            speed,

            dz *

            speed

        );

    }



    if (

        keys.Space &&

        player.grounded

    ) {


        player.velocityY =

        0.16;



        player.grounded =

        false;

    }



    player.velocityY -=

    0.012;



    player.y +=

    player.velocityY;



    if (

        player.y <= 2

    ) {


        player.y =

        2;



        player.velocityY =

        0;



        player.grounded =

        true;

    }



    camera.position.set(

        player.x,

        player.y,

        player.z

    );



    camera.rotation.order =

    "YXZ";



    camera.rotation.y =

    yaw;



    camera.rotation.x =

    pitch;

}

    if (

    const distance =

    Math.hypot(

        distance < 1.6

        completeLevel();
