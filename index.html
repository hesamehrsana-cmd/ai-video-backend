<script type="module">


import * as THREE from

"https://cdn.jsdelivr.net/npm/three@0.179.1/build/three.module.js";



// =====================================================
// SCENE
// =====================================================


const scene =

new THREE.Scene();


scene.background =

new THREE.Color(

0x87CEEB

);



// =====================================================
// CAMERA
// =====================================================


const camera =

new THREE.PerspectiveCamera(

75,

window.innerWidth /

window.innerHeight,

0.1,

1000

);


camera.position.set(

0,

5,

35

);



// =====================================================
// RENDERER
// =====================================================


const renderer =

new THREE.WebGLRenderer({

antialias: true

});


renderer.setSize(

window.innerWidth,

window.innerHeight

);


renderer.setPixelRatio(

Math.min(

window.devicePixelRatio,

2

)

);


renderer.shadowMap.enabled = true;


renderer.shadowMap.type =

THREE.PCFSoftShadowMap;


document

.getElementById("game")

.appendChild(

renderer.domElement

);



// =====================================================
// LIGHT
// =====================================================


const sun =

new THREE.DirectionalLight(

0xffffff,

2.5

);


sun.position.set(

30,

50,

30

);


sun.castShadow = true;


sun.shadow.mapSize.width = 2048;


sun.shadow.mapSize.height = 2048;


scene.add(sun);



const ambient =

new THREE.HemisphereLight(

0x87CEEB,

0x444444,

1

);


scene.add(ambient);



// =====================================================
// MATERIALS
// =====================================================


const concreteMaterial =

new THREE.MeshStandardMaterial({

color: 0xb7b7b7,

roughness: 0.75

});


const darkConcreteMaterial =

new THREE.MeshStandardMaterial({

color: 0x555555,

roughness: 0.8

});


const glassMaterial =

new THREE.MeshPhysicalMaterial({

color: 0x55bbee,

metalness: 0.1,

roughness: 0.05,

transmission: 0.2,

transparent: true,

opacity: 0.75

});


const metalMaterial =

new THREE.MeshStandardMaterial({

color: 0x333333,

metalness: 0.8,

roughness: 0.25

});


const goldMaterial =

new THREE.MeshStandardMaterial({

color: 0xd4af37,

metalness: 0.8,

roughness: 0.2

});


const woodMaterial =

new THREE.MeshStandardMaterial({

color: 0x4b2e1f,

roughness: 0.7

});


const stoneMaterial =

new THREE.MeshStandardMaterial({

color: 0x777777,

roughness: 0.9

});



// =====================================================
// HELPER
// =====================================================


function box(

w,

h,

d,

material,

x,

y,

z

) {


const geometry =

new THREE.BoxGeometry(

w,

h,

d

);


const mesh =

new THREE.Mesh(

geometry,

material

);


mesh.position.set(

x,

y,

z

);


mesh.castShadow = true;


mesh.receiveShadow = true;


scene.add(mesh);


return mesh;

}



// =====================================================
// GROUND
// =====================================================


const ground =

box(

150,

0.2,

150,

new THREE.MeshStandardMaterial({

color: 0x4f8f45

}),

0,

-0.1,

0

);



// =====================================================
// BUILDING BASE
// =====================================================


box(

26,

1,

20,

stoneMaterial,

0,

0.5,

0

);



// =====================================================
// MAIN BUILDING
// =====================================================


box(

24,

18,

18,

concreteMaterial,

0,

10,

0

);



// =====================================================
// SIDE WALL DETAILS
// =====================================================


for (

let y = 3;

y <= 17;

y += 3

) {


box(

17,

-12.2,

y,

);


box(

17,

darkConcreteMaterial,

12.2,

y,

0

);

}



// =====================================================
// HORIZONTAL FACADE LINES
// =====================================================


for (

let y = 2;

y <= 18;

y += 3

) {


box(

24.5,

0.25,

0.35,

darkConcreteMaterial,

0,

y,

-9.15

);


box(

24.5,

0.25,

0.35,

darkConcreteMaterial,

0,

y,

9.15

);

}



// =====================================================
// WINDOWS
// =====================================================


function createWindow(

x,

y,

z

) {


const group =

new THREE.Group();



// Glass


const glass =

new THREE.Mesh(

new THREE.BoxGeometry(

3,

2.1,

0.15

),

glassMaterial

);


group.add(glass);



// Left frame


const left =

new THREE.Mesh(

new THREE.BoxGeometry(

0.15,

2.4,

0.25

),

metalMaterial

);


left.position.x = -1.5;


group.add(left);



// Right frame


const right =

left.clone();


right.position.x = 1.5;


group.add(right);



// Top


const top =

new THREE.Mesh(

new THREE.BoxGeometry(

3.1,

0.15,

0.25

),

metalMaterial

);


top.position.y = 1.2;


group.add(top);



// Bottom


const bottom =

top.clone();


bottom.position.y = -1.2;


group.add(bottom);



// Middle divider


const divider =

new THREE.Mesh(

new THREE.BoxGeometry(

0.12,

2.2,

0.3

),

metalMaterial

);


group.add(divider);



// Position


group.position.set(

x,

y,

z

);


scene.add(group);

}



// Front windows


for (

let floor = 0;

floor < 5;

floor++

) {


for (

let column = -1;

column <= 1;

column++

) {


createWindow(

column * 6,

3 + floor * 3,

-9.2

);

}

}



// =====================================================
// BALCONIES
// =====================================================


function createBalcony(

x,

y

) {


const group =

new THREE.Group();



// Floor


const floor =

new THREE.Mesh(

new THREE.BoxGeometry(

5.5,

0.3,

2.5

),

stoneMaterial

);


floor.position.z = 1;


group.add(floor);



// Railings


for (

let i = -2;

i <= 2;

i++

) {


const post =

new THREE.Mesh(

new THREE.CylinderGeometry(

0.06,

0.06,

1.2,

8

),

metalMaterial

);


post.position.set(

i * 1.2,

0.7,

2.1

);


group.add(post);

}



// Horizontal railing


const rail =

new THREE.Mesh(

new THREE.BoxGeometry(

5.2,

0.12,

0.12

),

metalMaterial

);


rail.position.set(

0,

1.25,

2.1

);


group.add(rail);



group.position.set(

x,

y,

0

);


scene.add(group);

}



createBalcony(

-6,

7

);


createBalcony(

6,

13

);



// =====================================================
// MAIN ENTRANCE
// =====================================================


// Entrance frame


box(

7,

6,

0.5,

darkConcreteMaterial,

0,

3,

-9.5

);



// Glass doors


box(

2.8,

4.5,

0.15,

glassMaterial,

-1.5,

2.5,

-9.85

);


box(

2.8,

4.5,

0.15,

glassMaterial,

1.5,

2.5,

-9.85

);



// Door handles


const handle1 =

new THREE.Mesh(

new THREE.SphereGeometry(

0.12,

12,

12

),

goldMaterial

);


handle1.position.set(

-0.4,

2.5,

-10.1

);


scene.add(handle1);



const handle2 =

handle1.clone();


handle2.position.x =

0.4;


scene.add(handle2);



// =====================================================
// ENTRANCE COLUMNS
// =====================================================


function createColumn(

x

) {


const column =

new THREE.Mesh(

new THREE.CylinderGeometry(

0.6,

0.7,

6,

24

),

stoneMaterial

);


column.position.set(

x,

3,

-10

);


column.castShadow = true;


scene.add(column);

}



createColumn(-4);


createColumn(4);



// =====================================================
// STAIRS
// =====================================================


for (

let i = 0;

i < 5;

i++

) {


box(

10 - i,

0.4,

1,

stoneMaterial,

0,

0.2 + i * 0.4,

-11 - i

);

}



// =====================================================
// ROOF
// =====================================================


// Main roof


box(

25,

0.8,

19,

darkConcreteMaterial,

0,

19,

0

);



// Roof border


box(

26,

1,

0.7,

metalMaterial,

0,

19.5,

-9.5

);


box(

26,

1,

0.7,

metalMaterial,

0,

19.5,

9.5

);



// =====================================================
// ROOFTOP EQUIPMENT
// =====================================================


// Water tanks


for (

let x = -6;

x <= 6;

x += 6

) {


const tank =

new THREE.Mesh(

new THREE.CylinderGeometry(

1.2,

1.2,

2.5,

24

),

metalMaterial

);


tank.position.set(

x,

20.7,

);


scene.add(tank);

}



// Antenna


const antenna =

new THREE.Mesh(

),

);


antenna.position.set(

0,

23,

);

// =====================================================
// PLANTERS
// =====================================================


function createPlanter(

x,

z

) {


box(

1.5,

0.8,

1.5,

stoneMaterial,

x,

0.4,

z

);


const plant =

new THREE.Mesh(

new THREE.SphereGeometry(

1,

12,

12

),

new THREE.MeshStandardMaterial({

color: 0x228B22

})

);


plant.position.set(

x,

1.5,

z

);


scene.add(plant);

}



createPlanter(-7, -12);


createPlanter(7, -12);



// =====================================================
// STREET LIGHTS
// =====================================================


function createStreetLight(

x,

z

) {


const pole =

new THREE.Mesh(

new THREE.CylinderGeometry(

0.12,

0.15,

6,

12

),

metalMaterial

);


pole.position.set(

x,

3,

z

);


scene.add(pole);



const lamp =

new THREE.Mesh(

new THREE.SphereGeometry(

0.4,

16,

16

),

new THREE.MeshStandardMaterial({

color: 0xffffaa,

emissive: 0xffff44,

emissiveIntensity: 1

})

);


lamp.position.set(

x,

6,

z

);


scene.add(lamp);

}



createStreetLight(-10, -15);


createStreetLight(10, -15);



// =====================================================
// PLAYER
// =====================================================


const keys = {};


window.addEventListener(

"keydown",

e => {

keys[e.code] = true;

});


window.addEventListener(

"keyup",

e => {

keys[e.code] = false;

});



const playerSpeed = 0.18;



// =====================================================
// MOUSE LOOK
// =====================================================


let yaw = 0;

let pitch = 0;



renderer.domElement.addEventListener(

"click",

() => {

renderer.domElement.requestPointerLock();

});



document.addEventListener(

"mousemove",

event => {


if (

document.pointerLockElement !==

renderer.domElement

) return;



yaw -=

event.movementX *

0.002;



pitch -=

event.movementY *

0.002;



pitch =

Math.max(

-Math.PI / 2,

Math.min(

Math.PI / 2,

pitch

)

);

});



// =====================================================
// MOVEMENT
// =====================================================


function movePlayer() {


const forward =

new THREE.Vector3();


const right =

new THREE.Vector3();


const direction =

new THREE.Vector3();



camera.getWorldDirection(

forward

);


forward.y = 0;


forward.normalize();



right.crossVectors(

forward,

camera.up

).normalize();



if (

keys.KeyW

)

direction.add(forward);



if (

keys.KeyS

)

direction.sub(forward);



if (

keys.KeyA

)

direction.sub(right);



if (

keys.KeyD

)

direction.add(right);



if (

direction.length() > 0

) {


direction.normalize();


camera.position.addScaledVector(

direction,

playerSpeed

);

}



if (

keys.Space

)

camera.position.y +=

playerSpeed;



if (

keys.ShiftLeft ||

keys.ShiftRight

)

camera.position.y -=

playerSpeed;



camera.position.y =

Math.max(

1,

camera.position.y

);

}



// =====================================================
// CAMERA
// =====================================================


function updateCamera() {


camera.rotation.order =

"YXZ";


camera.rotation.y =

yaw;


camera.rotation.x =

pitch;

}



// =====================================================
// ANIMATION
// =====================================================


function animate() {


requestAnimationFrame(

animate

);


movePlayer();


updateCamera();



renderer.render(

scene,

camera

);

}


animate();



// =====================================================
// RESIZE
// =====================================================


window.addEventListener(

"resize",

() => {


camera.aspect =

window.innerWidth /

window.innerHeight;


camera.updateProjectionMatrix();


renderer.setSize(

window.innerWidth,

window.innerHeight

);

});



</script>
